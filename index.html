<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makarios Cakes - Sweet Moments, Divine Bites</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Chart.js for Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-purple: #3D1C2A;
            --brand-gold: #B88E2F;
            --brand-cream: #FDFBF7;
            --success-green: #D1FAE5;
            --success-text: #065F46;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--brand-cream);
            color: var(--brand-purple);
            overflow-x: hidden;
        }
        .font-brand { font-family: 'Playfair+Display', serif; }
        .bg-brand-purple { background-color: var(--brand-purple); }
        .text-brand-purple { color: var(--brand-purple); }
        .bg-brand-gold { background-color: var(--brand-gold); }
        
        .cake-card {
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cake-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        
        /* Side Cart Transition */
        #cart-sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Toast Animation */
        #toast {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .toast-hidden {
            transform: translate(-50%, -150%) scale(0.5);
            opacity: 0;
        }
        .toast-visible {
            transform: translate(-50%, 0) scale(1);
            opacity: 1;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Dashboard Card Switcher */
        .chart-container { transition: all 0.5s ease-in-out; }
        .tab-active { background-color: var(--brand-purple); color: white; }
        
        canvas { max-width: 100% !important; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-4 py-3 md:px-10 flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" onclick="showPage('home')">
            <div class="w-10 h-10 bg-brand-purple rounded-xl flex items-center justify-center text-white font-brand text-xl shadow-lg shadow-brand-purple/20">M</div>
            <h1 class="text-xl md:text-2xl font-brand font-bold tracking-tight hidden sm:block">
                Makarios <span class="text-brand-gold font-normal text-[10px] block -mt-1 uppercase tracking-[0.3em]">Cakes</span>
            </h1>
        </div>
        
        <div class="hidden lg:flex gap-10 items-center text-[10px] font-bold uppercase tracking-[0.2em]">
            <button onclick="showPage('home')" class="hover:text-brand-gold transition-colors py-1">Home Catalog</button>
            <button onclick="showPage('history')" class="hover:text-brand-gold transition-colors py-1">My Orders</button>
            <button onclick="showPage('admin')" class="hover:text-brand-gold transition-colors py-1 text-brand-gold">Owner Dashboard</button>
        </div>

        <div class="flex items-center gap-2 md:gap-4">
            <button onclick="toggleCart()" class="relative p-2.5 hover:bg-gray-100 rounded-full transition-all group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span id="cart-count" class="absolute top-1 right-1 bg-brand-gold text-white text-[10px] font-bold h-5 w-5 flex items-center justify-center rounded-full border-2 border-white shadow-sm">0</span>
            </button>
            <button class="lg:hidden p-2" onclick="toggleMobileMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="hidden fixed inset-0 z-[100] bg-white p-10 flex-col gap-8 text-center text-lg uppercase font-medium tracking-widest animate-in fade-in duration-300">
        <button onclick="showPage('home'); toggleMobileMenu()" class="hover:text-brand-gold">Home</button>
        <button onclick="showPage('history'); toggleMobileMenu()" class="hover:text-brand-gold">Orders</button>
        <button onclick="showPage('admin'); toggleMobileMenu()" class="hover:text-brand-gold text-brand-gold">Earnings</button>
        <button onclick="toggleMobileMenu()" class="mt-auto text-brand-gold font-bold p-4">Close Menu</button>
    </div>

    <!-- Main Content -->
    <main id="main-content" class="p-4 md:p-8 lg:p-12 max-w-[1600px] mx-auto min-h-[80vh]">
        <!-- Content injected here -->
    </main>

    <!-- Side Cart Panel -->
    <div id="cart-overlay" class="hidden fixed inset-0 bg-black/30 backdrop-blur-[2px] z-[60]" onclick="toggleCart()"></div>
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full sm:w-[450px] bg-white z-[70] shadow-2xl transform translate-x-full flex flex-col">
        <div class="p-8 border-b border-gray-100 flex justify-between items-center">
            <div>
                <h2 class="text-2xl font-brand font-bold">Your Bag</h2>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest">Review selection</p>
            </div>
            <button onclick="toggleCart()" class="text-3xl text-gray-300 hover:text-brand-purple transition-colors">&times;</button>
        </div>

        <div id="cart-items" class="flex-1 overflow-y-auto p-8 space-y-8 no-scrollbar">
            <!-- Items appear here -->
        </div>

        <div class="p-8 bg-gray-50/50 border-t border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Cart Total</span>
                <span id="cart-total" class="text-3xl font-brand font-bold">₹0</span>
            </div>
            <button onclick="goToCheckout()" class="w-full bg-brand-purple text-white py-5 rounded-2xl font-bold uppercase tracking-[0.2em] hover:bg-brand-gold transition-all shadow-xl shadow-brand-purple/10 flex items-center justify-center gap-2">
                Checkout Now
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </div>
    </div>

    <!-- Success Toast -->
    <div id="toast" class="toast-hidden fixed top-28 left-1/2 z-[200] bg-[#D1FAE5] text-[#065F46] px-8 py-4 rounded-full shadow-2xl border border-white/50 flex items-center gap-3 font-semibold whitespace-nowrap">
        <div class="w-6 h-6 bg-[#065F46] text-white rounded-full flex items-center justify-center">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <span id="toast-msg">Added to cart!</span>
    </div>

    <script>
        // --- Data & State ---
        const products = [
            { id: 1, name: 'Truffle Dream', price: 1200, desc: 'Decadent Belgian chocolate with a silky smooth ganache center.', category: 'Signature', img: 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=800' },
            { id: 2, name: 'Fruit Symphony', price: 950, desc: 'Moist vanilla base layered with fresh kiwi, berries and mango.', category: 'Fresh', img: 'https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?w=800' },
            { id: 3, name: 'Red Velvet Silk', price: 1100, desc: 'Tender cocoa-infused sponge with velvety cream cheese frosting.', category: 'Classic', img: 'https://images.unsplash.com/photo-1586788680434-30d324b2d46f?w=800' },
            { id: 4, name: 'Biscoff Crunch', price: 1400, desc: 'Original Lotus Biscoff spread paired with caramelized crumbs.', category: 'Premium', img: 'https://images.unsplash.com/photo-1535141192574-5d4897c12636?w=800' },
            { id: 5, name: 'Mango Delight', price: 850, desc: 'Seasonal Alphonso mango pulp whipped into light cream layers.', category: 'Seasonal', img: 'https://images.unsplash.com/photo-1550617931-e17a7b70dce2?w=800' },
            { id: 6, name: 'Hazelnut Royale', price: 1550, desc: 'Double roasted hazelnuts with rich dark chocolate mousse.', category: 'Premium', img: 'https://images.unsplash.com/photo-1606312619070-d48b4c652a52?w=800' }
        ];

        let cart = [];
        let orders = JSON.parse(localStorage.getItem('makarios_orders')) || [];
        let toastTimer;
        let activeAdminTab = 'monthly';

        // --- Controller ---
        function showPage(page, data = null) {
            const container = document.getElementById('main-content');
            container.classList.add('opacity-0');
            
            setTimeout(() => {
                window.scrollTo(0, 0);
                switch(page) {
                    case 'home': renderHome(container); break;
                    case 'checkout': renderCheckout(container); break;
                    case 'history': renderHistory(container); break;
                    case 'admin': renderAdmin(container); break;
                    case 'success': renderSuccess(container, data); break;
                }
                container.classList.remove('opacity-0');
                container.classList.add('transition-opacity', 'duration-300');
            }, 150);
        }

        function renderHome(container) {
            container.innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-4">
                    <div>
                        <h2 class="text-4xl md:text-5xl font-brand font-bold mb-2 text-brand-purple">Artisan Menu</h2>
                        <p class="text-gray-400 uppercase tracking-widest text-[10px] font-bold">Handcrafted Sweetness</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
                    ${products.map(p => `
                        <div class="cake-card bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-50">
                            <div class="relative h-60 overflow-hidden">
                                <img src="${p.img}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105">
                                <div class="absolute top-4 left-4 bg-white/90 backdrop-blur-md px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest">
                                    ${p.category}
                                </div>
                            </div>
                            <div class="p-6 flex flex-col flex-1">
                                <h3 class="text-lg font-bold mb-1 font-brand">${p.name}</h3>
                                <p class="text-gray-400 text-[11px] leading-relaxed mb-6 line-clamp-2">${p.desc}</p>
                                <div class="mt-auto flex items-center justify-between">
                                    <div class="flex flex-col">
                                        <span class="text-[9px] text-gray-400 uppercase font-bold">Price</span>
                                        <span class="text-xl font-bold text-brand-purple">₹${p.price.toLocaleString()}</span>
                                    </div>
                                    <button onclick="addToCart(${p.id})" class="bg-brand-purple text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-brand-gold hover:scale-105 transition-all active:scale-95 shadow-lg">
                                        Add to Cart
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderCheckout(container) {
            const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const delivery = 150;
            const discount = subtotal > 2000 ? subtotal * 0.1 : 0;
            const total = subtotal + delivery - discount;

            container.innerHTML = `
                <div class="max-w-6xl mx-auto">
                    <div class="flex flex-col lg:flex-row gap-12">
                        <div class="flex-1">
                            <h2 class="text-3xl font-brand font-bold mb-10">Order Information</h2>
                            <form onsubmit="handlePlaceOrder(event)" class="space-y-6">
                                <div class="grid md:grid-cols-2 gap-6">
                                    <div class="space-y-1">
                                        <label class="text-[9px] uppercase font-bold tracking-widest text-gray-400">Full Name</label>
                                        <input type="text" name="name" required class="w-full bg-white p-4 rounded-2xl border border-gray-100 outline-none focus:border-brand-gold transition-colors">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="text-[9px] uppercase font-bold tracking-widest text-gray-400">Contact Number</label>
                                        <input type="tel" name="phone" required class="w-full bg-white p-4 rounded-2xl border border-gray-100 outline-none focus:border-brand-gold transition-colors">
                                    </div>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[9px] uppercase font-bold tracking-widest text-gray-400">Full Delivery Address</label>
                                    <textarea name="location" required rows="3" class="w-full bg-white p-4 rounded-2xl border border-gray-100 outline-none focus:border-brand-gold transition-colors"></textarea>
                                </div>
                                <div class="grid md:grid-cols-2 gap-6">
                                    <div class="space-y-1">
                                        <label class="text-[9px] uppercase font-bold tracking-widest text-gray-400">Occasion Kit</label>
                                        <select name="addons" class="w-full bg-white p-4 rounded-2xl border border-gray-100 outline-none appearance-none">
                                            <option value="none">Standard Package (₹0)</option>
                                            <option value="candles">Sparkle Candles (+₹50)</option>
                                            <option value="card">Handwritten Card (+₹100)</option>
                                            <option value="full_kit">Grand Party Kit (+₹500)</option>
                                        </select>
                                    </div>
                                    <div class="space-y-1">
                                        <label class="text-[9px] uppercase font-bold tracking-widest text-gray-400">Payment Selection</label>
                                        <div class="flex gap-4 h-[56px]">
                                            <label class="flex-1 cursor-pointer">
                                                <input type="radio" name="payment" value="Online" checked class="hidden peer">
                                                <div class="h-full border rounded-2xl flex items-center justify-center peer-checked:bg-brand-purple peer-checked:text-white transition-all text-[10px] font-bold uppercase tracking-widest">Online</div>
                                            </label>
                                            <label class="flex-1 cursor-pointer">
                                                <input type="radio" name="payment" value="COD" class="hidden peer">
                                                <div class="h-full border rounded-2xl flex items-center justify-center peer-checked:bg-brand-purple peer-checked:text-white transition-all text-[10px] font-bold uppercase tracking-widest">COD</div>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                <button type="submit" class="w-full bg-brand-purple text-white py-5 rounded-2xl font-bold uppercase tracking-[0.3em] hover:bg-brand-gold shadow-2xl transition-all mt-4">Place My Order</button>
                            </form>
                        </div>

                        <div class="lg:w-[420px]">
                            <div class="bg-white p-8 rounded-[2rem] border border-gray-50 shadow-xl sticky top-32">
                                <h3 class="text-xl font-brand font-bold mb-6">Review Items</h3>
                                <div class="space-y-6 max-h-[400px] overflow-y-auto no-scrollbar mb-8">
                                    ${cart.map(i => `
                                        <div class="flex items-center gap-4">
                                            <img src="${i.img}" class="w-14 h-14 rounded-2xl object-cover shadow-sm">
                                            <div class="flex-1">
                                                <p class="text-xs font-bold">${i.name}</p>
                                                <p class="text-[9px] text-gray-400 uppercase tracking-widest">Qty: ${i.qty}</p>
                                            </div>
                                            <span class="text-xs font-bold text-brand-purple">₹${(i.price * i.qty).toLocaleString()}</span>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="space-y-3 pt-6 border-t border-dashed border-gray-100">
                                    <div class="flex justify-between text-[10px] uppercase font-bold tracking-widest text-gray-400">
                                        <span>Subtotal</span>
                                        <span>₹${subtotal.toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-between text-[10px] uppercase font-bold tracking-widest text-gray-400">
                                        <span>Delivery Fee</span>
                                        <span>₹${delivery.toLocaleString()}</span>
                                    </div>
                                    ${discount > 0 ? `
                                        <div class="flex justify-between text-[10px] uppercase font-bold tracking-widest text-green-600">
                                            <span>Bulk Discount</span>
                                            <span>-₹${discount.toLocaleString()}</span>
                                        </div>
                                    ` : ''}
                                    <div class="flex justify-between items-end pt-4 border-t">
                                        <span class="text-xs uppercase font-bold tracking-[0.2em]">Grand Total</span>
                                        <span class="text-3xl font-brand font-bold text-brand-purple">₹${total.toLocaleString()}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- Core Logic ---
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateCartUI();
            showToast(`${product.name} Added!`);
        }

        function updateCartUI() {
            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-count').innerText = count;
            renderCartItems();
        }

        function renderCartItems() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-20 italic text-sm">Cart is currently empty...</div>`;
                document.getElementById('cart-total').innerText = `₹0`;
                return;
            }
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price * item.qty;
                return `
                    <div class="flex gap-4 group">
                        <img src="${item.img}" class="w-16 h-16 rounded-2xl object-cover shadow-sm group-hover:scale-105 transition-transform">
                        <div class="flex-1 flex flex-col justify-center">
                            <h4 class="font-bold text-xs mb-1">${item.name}</h4>
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-3 bg-gray-50 rounded-lg p-1 px-2">
                                    <button onclick="changeQty(${item.id}, -1)" class="text-sm font-bold hover:text-brand-gold">-</button>
                                    <span class="text-[10px] font-bold w-4 text-center">${item.qty}</span>
                                    <button onclick="changeQty(${item.id}, 1)" class="text-sm font-bold hover:text-brand-gold">+</button>
                                </div>
                                <span class="text-sm font-bold text-brand-purple">₹${(item.price * item.qty).toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = `₹${total.toLocaleString()}`;
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            const overlay = document.getElementById('cart-overlay');
            const isOpen = sidebar.classList.contains('translate-x-0');
            
            if (isOpen) {
                sidebar.classList.remove('translate-x-0');
                sidebar.classList.add('translate-x-full');
                overlay.classList.add('hidden');
            } else {
                sidebar.classList.remove('translate-x-full');
                sidebar.classList.add('translate-x-0');
                overlay.classList.remove('hidden');
                renderCartItems();
            }
        }

        function goToCheckout() {
            if (cart.length === 0) {
                showToast("Add something first!");
                return;
            }
            toggleCart();
            showPage('checkout');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            const m = document.getElementById('toast-msg');
            if (toastTimer) clearTimeout(toastTimer);
            m.innerText = msg;
            t.classList.remove('toast-hidden');
            t.classList.add('toast-visible');
            toastTimer = setTimeout(() => {
                t.classList.remove('toast-visible');
                t.classList.add('toast-hidden');
            }, 3000); 
        }

        async function handlePlaceOrder(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const total = subtotal + 150 - (subtotal > 2000 ? subtotal * 0.1 : 0);

            const order = {
                id: 'MK-' + Math.random().toString(36).substr(2, 5).toUpperCase(),
                date: new Date().toISOString(),
                customer: formData.get('name'),
                phone: formData.get('phone'),
                location: formData.get('location'),
                items: [...cart],
                total: total,
                payment: formData.get('payment'),
                addon: formData.get('addons')
            };

            orders.unshift(order);
            localStorage.setItem('makarios_orders', JSON.stringify(orders));

            // Structured WhatsApp Message
            const itemList = order.items.map(i => `• ${i.name} (x${i.qty})`).join('\n');
            const waMessage = `*ORDER CONFIRMED - Makarios Cakes* 🍰\n\n` +
                              `Hello Makarios Team!\n` +
                              `I have just placed an order with the following details:\n\n` +
                              `*Order ID:* #${order.id}\n` +
                              `*Customer Name:* ${order.customer}\n` +
                              `*Contact Number:* ${order.phone}\n` +
                              `*Total Amount:* ₹${order.total.toLocaleString()}\n` +
                              `*Payment Method:* ${order.payment}\n\n` +
                              `*Items Ordered:* \n${itemList}\n\n` +
                              `*Delivery Address:* \n${order.location}\n\n` +
                              `_I have generated the PDF Invoice. Please let me know when the baking starts!_`;

            const waUrl = `https://wa.me/${order.phone}?text=${encodeURIComponent(waMessage)}`;

            cart = [];
            updateCartUI();
            showPage('success', { order, waUrl });
        }

        function renderSuccess(container, { order, waUrl }) {
            container.innerHTML = `
                <div class="max-w-xl mx-auto text-center py-20 animate-in zoom-in duration-500">
                    <div class="w-24 h-24 bg-green-50 text-green-600 rounded-full flex items-center justify-center mx-auto mb-10 border-4 border-green-100">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h2 class="text-5xl font-brand font-bold mb-4">Baked with Love!</h2>
                    <p class="text-gray-400 mb-12">Your order <b>#${order.id}</b> is being processed. Get ready for a divine treat!</p>
                    
                    <div class="grid gap-4 px-6">
                        <button onclick="downloadPDF('${order.id}')" class="w-full bg-brand-purple text-white py-5 rounded-2xl font-bold uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-brand-gold transition-all">
                            Save PDF Invoice
                        </button>
                        <a href="${waUrl}" target="_blank" class="w-full bg-[#25D366] text-white py-5 rounded-2xl font-bold uppercase tracking-widest flex items-center justify-center gap-2">
                             WhatsApp Confirmation
                        </a>
                        <button onclick="showPage('home')" class="mt-6 text-brand-gold font-bold uppercase text-[10px] tracking-widest hover:underline">Back to Shop</button>
                    </div>
                </div>
            `;
        }

        function renderHistory(container) {
            container.innerHTML = `
                <h2 class="text-3xl font-brand font-bold mb-10">Past Orders</h2>
                <div class="grid gap-4">
                    ${orders.length === 0 ? `<p class="py-20 text-center opacity-30 italic">No history found...</p>` : 
                    orders.map(o => `
                        <div class="bg-white p-6 rounded-3xl border border-gray-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <span class="text-[9px] font-bold text-gray-300 uppercase tracking-widest">ID: ${o.id}</span>
                                <h3 class="font-bold text-sm">${o.items.map(i => i.name).join(', ')}</h3>
                                <p class="text-[10px] text-gray-400 mt-1">${new Date(o.date).toLocaleDateString()} • ${o.location}</p>
                            </div>
                            <div class="flex items-center gap-4 w-full md:w-auto justify-between">
                                <span class="text-xl font-brand font-bold">₹${o.total.toLocaleString()}</span>
                                <button onclick="downloadPDF('${o.id}')" class="p-3 bg-gray-50 rounded-xl hover:bg-brand-purple hover:text-white transition-all">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // --- Dashboard & Analytics ---
        function renderAdmin(container) {
            const total = orders.reduce((s, o) => s + o.total, 0);
            
            container.innerHTML = `
                <div class="space-y-12 animate-in fade-in duration-500">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        <div class="bg-brand-purple p-10 rounded-[2.5rem] text-white shadow-xl shadow-brand-purple/10">
                            <span class="text-[10px] uppercase font-bold tracking-[0.3em] opacity-50">Total Revenue</span>
                            <p class="text-5xl font-brand font-bold mt-2">₹${total.toLocaleString()}</p>
                        </div>
                        <div class="bg-white p-10 rounded-[2.5rem] border border-gray-100 shadow-sm">
                            <span class="text-[10px] uppercase font-bold tracking-[0.3em] text-gray-400">Total Orders</span>
                            <p class="text-5xl font-brand font-bold mt-2">${orders.length}</p>
                        </div>
                        <div class="bg-white p-10 rounded-[2.5rem] border border-gray-100 shadow-sm flex flex-col justify-center">
                            <span class="text-[10px] uppercase font-bold tracking-[0.3em] text-gray-400">Average Order</span>
                            <p class="text-3xl font-brand font-bold mt-2">₹${orders.length ? Math.round(total/orders.length).toLocaleString() : 0}</p>
                        </div>
                    </div>

                    <!-- Flash Card Chart Switcher -->
                    <div class="bg-white p-8 md:p-12 rounded-[3rem] border border-gray-100 shadow-xl overflow-hidden relative">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
                            <div>
                                <h3 class="text-2xl font-brand font-bold text-brand-purple">Performance Insights</h3>
                                <p class="text-xs text-gray-400 uppercase tracking-widest font-bold mt-1">Visualize your sweet growth</p>
                            </div>
                            
                            <!-- Toggle Buttons -->
                            <div class="flex bg-gray-100 p-1.5 rounded-2xl self-start">
                                <button onclick="switchAdminTab('monthly')" id="tab-monthly" class="px-6 py-2.5 rounded-xl text-[10px] uppercase font-bold tracking-widest transition-all ${activeAdminTab === 'monthly' ? 'tab-active shadow-lg' : 'text-gray-400 hover:text-brand-purple'}">
                                    Monthly (30D)
                                </button>
                                <button onclick="switchAdminTab('yearly')" id="tab-yearly" class="px-6 py-2.5 rounded-xl text-[10px] uppercase font-bold tracking-widest transition-all ${activeAdminTab === 'yearly' ? 'tab-active shadow-lg' : 'text-gray-400 hover:text-brand-purple'}">
                                    Yearly (12M)
                                </button>
                            </div>
                        </div>

                        <div class="relative h-[400px] w-full chart-container">
                            <div id="chart-monthly-wrapper" class="${activeAdminTab === 'monthly' ? 'block' : 'hidden'} animate-in fade-in zoom-in duration-500 h-full">
                                <canvas id="dailyChart"></canvas>
                            </div>
                            <div id="chart-yearly-wrapper" class="${activeAdminTab === 'yearly' ? 'block' : 'hidden'} animate-in fade-in zoom-in duration-500 h-full">
                                <canvas id="monthlyChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            initCharts();
        }

        function switchAdminTab(tab) {
            activeAdminTab = tab;
            const monthlyWrapper = document.getElementById('chart-monthly-wrapper');
            const yearlyWrapper = document.getElementById('chart-yearly-wrapper');
            const btnMonthly = document.getElementById('tab-monthly');
            const btnYearly = document.getElementById('tab-yearly');

            if(tab === 'monthly') {
                monthlyWrapper.classList.remove('hidden');
                yearlyWrapper.classList.add('hidden');
                btnMonthly.classList.add('tab-active', 'shadow-lg');
                btnMonthly.classList.remove('text-gray-400');
                btnYearly.classList.remove('tab-active', 'shadow-lg');
                btnYearly.classList.add('text-gray-400');
            } else {
                yearlyWrapper.classList.remove('hidden');
                monthlyWrapper.classList.add('hidden');
                btnYearly.classList.add('tab-active', 'shadow-lg');
                btnYearly.classList.remove('text-gray-400');
                btnMonthly.classList.remove('tab-active', 'shadow-lg');
                btnMonthly.classList.add('text-gray-400');
            }
        }

        function initCharts() {
            // Aggregate Daily Data (30 Days)
            const dailyData = {};
            const today = new Date();
            for(let i = 29; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const dateKey = d.toISOString().split('T')[0];
                dailyData[dateKey] = 0;
            }
            orders.forEach(o => {
                const dateKey = o.date.split('T')[0];
                if(dailyData.hasOwnProperty(dateKey)) {
                    dailyData[dateKey] += o.total;
                }
            });

            new Chart(document.getElementById('dailyChart'), {
                type: 'line',
                data: {
                    labels: Object.keys(dailyData).map(k => k.split('-')[2]),
                    datasets: [{
                        label: 'Daily Revenue (₹)',
                        data: Object.values(dailyData),
                        borderColor: '#B88E2F',
                        backgroundColor: 'rgba(184, 142, 47, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 3,
                        pointBackgroundColor: '#B88E2F'
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { color: '#F3F4F6' } }, x: { grid: { display: false } } }
                }
            });

            // Aggregate Monthly Data (12 Months)
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const monthlyData = {};
            for(let i = 11; i >= 0; i--) {
                const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
                const key = `${d.getFullYear()}-${d.getMonth()}`;
                monthlyData[key] = { label: `${monthNames[d.getMonth()]}`, value: 0 };
            }
            orders.forEach(o => {
                const d = new Date(o.date);
                const key = `${d.getFullYear()}-${d.getMonth()}`;
                if(monthlyData[key]) monthlyData[key].value += o.total;
            });

            new Chart(document.getElementById('monthlyChart'), {
                type: 'bar',
                data: {
                    labels: Object.values(monthlyData).map(m => m.label),
                    datasets: [{
                        label: 'Monthly Revenue (₹)',
                        data: Object.values(monthlyData).map(m => m.value),
                        backgroundColor: '#3D1C2A',
                        borderRadius: 12,
                        hoverBackgroundColor: '#B88E2F'
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { color: '#F3F4F6' } }, x: { grid: { display: false } } }
                }
            });
        }

        // --- PDF Utils ---
        function downloadPDF(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // PDF Branding
            doc.setFillColor(61, 28, 42); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text('MAKARIOS CAKES', 20, 25);
            doc.setFontSize(10); doc.text('SWEET MOMENTS, DIVINE BITES', 20, 32);
            
            // Content
            doc.setTextColor(0, 0, 0); doc.setFontSize(12);
            doc.text(`Official Invoice`, 20, 55);
            doc.setFontSize(10);
            doc.text(`Order ID: #${order.id}`, 20, 65);
            doc.text(`Customer Name: ${order.customer}`, 20, 70);
            doc.text(`Order Date: ${new Date(order.date).toLocaleString()}`, 20, 75);
            
            doc.line(20, 85, 190, 85);
            doc.text('Items Details:', 20, 95);
            order.items.forEach((it, idx) => {
                doc.text(`${idx + 1}. ${it.name} x ${it.qty}`, 25, 105 + (idx * 8));
                doc.text(`₹${(it.price * it.qty).toLocaleString()}`, 170, 105 + (idx * 8), { align: 'right' });
            });
            
            doc.line(20, 145, 190, 145);
            doc.setFontSize(14); doc.setFont(undefined, 'bold');
            doc.text(`TOTAL AMOUNT PAID: ₹${order.total.toLocaleString()}`, 20, 160);
            
            doc.setFont(undefined, 'normal'); doc.setFontSize(8); doc.setTextColor(150, 150, 150);
            doc.text('This is a computer-generated receipt. Thank you for choosing Makarios Cakes.', 105, 280, { align: 'center' });
            
            doc.save(`Makarios_Invoice_${order.id}.pdf`);
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
            menu.classList.toggle('flex');
        }

        window.onload = () => showPage('home');
    </script>
</body>
</html>
