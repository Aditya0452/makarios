<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makarios Cakes - Owner Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Chart.js for Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-purple: #3D1C2A;
            --brand-gold: #B88E2F;
            --brand-cream: #FDFBF7;
            --success-green: #D1FAE5;
            --success-text: #065F46;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--brand-cream);
            color: var(--brand-purple);
            overflow-x: hidden;
        }
        .font-brand { font-family: 'Playfair+Display', serif; }
        .font-receipt { font-family: 'Courier Prime', monospace; }
        .bg-brand-purple { background-color: var(--brand-purple); }
        .text-brand-purple { color: var(--brand-purple); }
        .bg-brand-gold { background-color: var(--brand-gold); }
        
        .cake-card {
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cake-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        
        #cart-sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        #toast {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .toast-hidden { transform: translate(-50%, -150%) scale(0.5); opacity: 0; }
        .toast-visible { transform: translate(-50%, 0) scale(1); opacity: 1; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .tab-active { background-color: var(--brand-purple); color: white; }
        canvas { max-width: 100% !important; }

        /* Modal styling */
        .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        
        /* Custom file input appearance */
        input[type="file"]::file-selector-button {
            background-color: var(--brand-purple);
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            border: none;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            margin-right: 12px;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-4 py-3 md:px-10 flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" onclick="showPage('home')">
            <img src="logo.png" alt="Logo" class="w-28 h-16 object-contain rounded-lg" onerror="this.src='https://via.placeholder.com/50?text=Logo'">
            <h1 class="text-xl md:text-2xl font-brand font-bold tracking-tight hidden sm:block">
                Makarios <span class="text-brand-gold font-normal text-[10px] block -mt-1 uppercase tracking-[0.3em]">Cakes</span>
            </h1>
        </div>
        
        <div class="hidden lg:flex gap-10 items-center text-[10px] font-bold uppercase tracking-[0.2em]">
            <button onclick="showPage('home')" class="hover:text-brand-gold transition-colors py-1">Inventory</button>
            <button onclick="showPage('history')" class="hover:text-brand-gold transition-colors py-1">Order Log</button>
            <button onclick="showPage('admin')" class="hover:text-brand-gold transition-colors py-1">Analytics</button>
        </div>

        <div class="flex items-center gap-2 md:gap-4">
            <button onclick="toggleCart()" class="relative p-2.5 hover:bg-gray-100 rounded-full transition-all group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span id="cart-count" class="absolute top-1 right-1 bg-brand-gold text-white text-[10px] font-bold h-5 w-5 flex items-center justify-center rounded-full border-2 border-white shadow-sm">0</span>
            </button>
            <button class="lg:hidden p-2" onclick="toggleMobileMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden fixed inset-0 z-[100] bg-white p-10 flex-col gap-8 text-center text-lg uppercase font-medium tracking-widest animate-in fade-in duration-300">
        <button onclick="showPage('home'); toggleMobileMenu()">Inventory</button>
        <button onclick="showPage('history'); toggleMobileMenu()">Orders</button>
        <button onclick="showPage('admin'); toggleMobileMenu()">Dashboard</button>
        <button onclick="toggleMobileMenu()" class="mt-auto text-brand-gold font-bold p-4">Close</button>
    </div>

    <!-- Main Content -->
    <main id="main-content" class="p-4 md:p-8 lg:p-12 max-w-[1600px] mx-auto min-h-[80vh]">
        <!-- Page Content -->
    </main>

    <!-- Add Product Modal -->
    <div id="product-modal" class="hidden fixed inset-0 z-[150] modal-overlay flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2rem] p-8 shadow-2xl animate-in zoom-in duration-300">
            <h2 class="text-2xl font-brand font-bold mb-6">Add New Cake</h2>
            <form id="add-product-form" onsubmit="handleNewProduct(event)" class="space-y-4">
                <input type="text" name="name" placeholder="Cake Name" required class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand-gold">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" name="price" placeholder="Price (₹)" required class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand-gold">
                    <select name="category" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand-gold">
                        <option value="Signature">Signature</option>
                        <option value="Fresh">Fresh</option>
                        <option value="Classic">Classic</option>
                        <option value="Premium">Premium</option>
                    </select>
                </div>
                <textarea name="desc" placeholder="Description" rows="2" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand-gold"></textarea>
                
                <!-- Updated: File Upload instead of URL -->
                <div class="space-y-1">
                    <label class="block text-[10px] text-gray-400 font-bold uppercase tracking-widest ml-4">Select Cake Photo</label>
                    <input type="file" id="product-img-file" accept="image/*" required class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand-gold text-[10px] text-gray-500 font-medium">
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeProductModal()" class="flex-1 py-4 text-gray-400 font-bold uppercase text-xs tracking-widest">Cancel</button>
                    <button type="submit" class="flex-1 bg-brand-purple text-white py-4 rounded-2xl font-bold uppercase text-xs tracking-widest shadow-lg">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Side Cart -->
    <div id="cart-overlay" class="hidden fixed inset-0 bg-black/30 backdrop-blur-[2px] z-[60]" onclick="toggleCart()"></div>
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full sm:w-[450px] bg-white z-[70] shadow-2xl transform translate-x-full flex flex-col">
        <div class="p-8 border-b border-gray-100 flex justify-between items-center">
            <div>
                <h2 class="text-2xl font-brand font-bold">Booking Bin</h2>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest">Current Selection</p>
            </div>
            <button onclick="toggleCart()" class="text-3xl text-gray-300 hover:text-brand-purple">&times;</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-8 space-y-8 no-scrollbar"></div>
        <div class="p-8 bg-gray-50 border-t border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Grand Total</span>
                <span id="cart-total" class="text-3xl font-brand font-bold">₹0</span>
            </div>
            <button onclick="goToCheckout()" class="w-full bg-brand-purple text-white py-5 rounded-2xl font-bold uppercase tracking-[0.2em] hover:bg-brand-gold transition-all shadow-xl">
                Proceed to Order
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast-hidden fixed top-28 left-1/2 z-[200] bg-[#D1FAE5] text-[#065F46] px-8 py-4 rounded-full shadow-2xl border border-white/50 flex items-center gap-3 font-semibold">
        <span id="toast-msg">Added!</span>
    </div>

    <script>
        // --- State Management ---
        const initialProducts = [
            { id: 1, name: 'Red Velvet Cheesecake', price: 1500, desc: 'Tender cocoa-infused sponge with velvety cream cheese frosting.', category: 'Classic', img: 'https://images.unsplash.com/photo-1586788680434-30d324b2d46f?w=800' },
            { id: 2, name: 'Truffle Dream', price: 1200, desc: 'Decadent Belgian chocolate with a silky smooth ganache center.', category: 'Signature', img: 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=800' },
            { id: 3, name: 'Biscoff Crunch', price: 1400, desc: 'Original Lotus Biscoff spread paired with caramelized crumbs.', category: 'Premium', img: 'https://images.unsplash.com/photo-1535141192574-5d4897c12636?w=800' },
            { id: 4, name: 'Fruit Symphony', price: 950, desc: 'Moist vanilla base layered with fresh kiwi, berries and mango.', category: 'Fresh', img: 'https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?w=800' },
            { id: 5, name: 'Mango Delight', price: 850, desc: 'Seasonal Alphonso mango pulp whipped into light cream layers.', category: 'Seasonal', img: 'https://images.unsplash.com/photo-1550617931-e17a7b70dce2?w=800' },
            { id: 6, name: 'Hazelnut Royale', price: 1550, desc: 'Double roasted hazelnuts with rich dark chocolate mousse.', category: 'Premium', img: 'https://images.unsplash.com/photo-1606312619070-d48b4c652a52?w=800' }
        ];

        let products = JSON.parse(localStorage.getItem('makarios_products')) || initialProducts;
        let cart = [];
        let orders = JSON.parse(localStorage.getItem('makarios_orders')) || [];
        let toastTimer;
        let activeAdminTab = 'monthly';

        // --- View Controller ---
        function showPage(page, data = null) {
            const container = document.getElementById('main-content');
            container.classList.add('opacity-0');
            setTimeout(() => {
                window.scrollTo(0, 0);
                switch(page) {
                    case 'home': renderHome(container); break;
                    case 'checkout': renderCheckout(container); break;
                    case 'history': renderHistory(container); break;
                    case 'admin': renderAdmin(container); break;
                    case 'success': renderSuccess(container, data); break;
                }
                container.classList.remove('opacity-0');
            }, 150);
        }

        function renderHome(container) {
            container.innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
                    <div>
                        <h2 class="text-4xl md:text-5xl font-brand font-bold mb-2">Cake Inventory</h2>
                        <p class="text-gray-400 uppercase tracking-widest text-[10px] font-bold">Manage your artisan creations</p>
                    </div>
                    <button onclick="openProductModal()" class="bg-brand-gold text-white px-8 py-4 rounded-full font-bold uppercase text-[10px] tracking-widest shadow-xl flex items-center gap-2 hover:scale-105 transition-transform">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2.5"/></svg>
                        Add New Cake
                    </button>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                    ${products.map(p => `
                        <div class="cake-card bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-gray-50 p-4">
                            <div class="relative h-56 overflow-hidden rounded-[2rem]">
                                <img src="${p.img}" class="w-full h-full object-cover">
                                <div class="absolute top-4 left-4 bg-white/90 backdrop-blur-md px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest">
                                    ${p.category}
                                </div>
                            </div>
                            <div class="p-4 flex flex-col flex-1">
                                <h3 class="text-lg font-bold mb-1 font-brand">${p.name}</h3>
                                <p class="text-gray-400 text-[11px] leading-relaxed mb-6 line-clamp-2">${p.desc}</p>
                                <div class="mt-auto flex items-center justify-between">
                                    <span class="text-xl font-bold text-brand-purple">₹${p.price.toLocaleString()}</span>
                                    <button onclick="addToCart(${p.id})" class="bg-brand-purple text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-lg active:scale-95">
                                        Book Now
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // --- Logic Handlers ---
        function openProductModal() { document.getElementById('product-modal').classList.remove('hidden'); }
        function closeProductModal() { document.getElementById('product-modal').classList.add('hidden'); }

        // Updated: Handle file upload
        function handleNewProduct(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const fileInput = document.getElementById('product-img-file');
            const file = fileInput.files[0];

            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const imageDataUrl = event.target.result;
                const newProduct = {
                    id: Date.now(),
                    name: formData.get('name'),
                    price: parseInt(formData.get('price')),
                    desc: formData.get('desc'),
                    category: formData.get('category'),
                    img: imageDataUrl
                };
                products.unshift(newProduct);
                localStorage.setItem('makarios_products', JSON.stringify(products));
                closeProductModal();
                renderHome(document.getElementById('main-content'));
                showToast("Product Added Successfully!");
                e.target.reset();
            };
            reader.readAsDataURL(file);
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            if (existing) existing.qty++;
            else cart.push({ ...product, qty: 1 });
            updateCartUI();
            showToast(`${product.name} Added!`);
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0);
            renderCartItems();
        }

        function renderCartItems() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-20 italic">No bookings yet...</div>`;
                document.getElementById('cart-total').innerText = `₹0`;
                return;
            }
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price * item.qty;
                return `
                    <div class="flex gap-4">
                        <img src="${item.img}" class="w-16 h-16 rounded-2xl object-cover shadow-sm">
                        <div class="flex-1">
                            <h4 class="font-bold text-xs">${item.name}</h4>
                            <div class="flex items-center justify-between mt-1">
                                <div class="flex items-center gap-3 bg-gray-50 rounded-lg p-1 px-2">
                                    <button onclick="changeQty(${item.id}, -1)" class="text-sm">-</button>
                                    <span class="text-[10px] font-bold">${item.qty}</span>
                                    <button onclick="changeQty(${item.id}, 1)" class="text-sm">+</button>
                                </div>
                                <span class="text-sm font-bold">₹${(item.price * item.qty).toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = `₹${total.toLocaleString()}`;
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }

        function toggleCart() {
            const sb = document.getElementById('cart-sidebar');
            const ov = document.getElementById('cart-overlay');
            const isOpen = sb.classList.contains('translate-x-0');
            if (isOpen) { sb.classList.remove('translate-x-0'); sb.classList.add('translate-x-full'); ov.classList.add('hidden'); }
            else { sb.classList.remove('translate-x-full'); sb.classList.add('translate-x-0'); ov.classList.remove('hidden'); renderCartItems(); }
        }

        function goToCheckout() { if (cart.length > 0) { toggleCart(); showPage('checkout'); } }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.remove('toast-hidden'); t.classList.add('toast-visible');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { t.classList.remove('toast-visible'); t.classList.add('toast-hidden'); }, 3000);
        }

        async function handlePlaceOrder(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const discount = subtotal > 2000 ? subtotal * 0.1 : 0;
            const addonMap = { none: "", candles: "Candles (10)", card: "Handwritten Card", full_kit: "Extra Frosting, Candles (10)" };
            const total = subtotal + 150 - discount;

            const order = {
                id: '1001-' + Math.random().toString(36).substr(2, 1).toUpperCase(),
                date: new Date().toISOString(),
                customer: formData.get('name'),
                phone: formData.get('phone'),
                location: formData.get('location'),
                items: [...cart],
                subtotal: subtotal,
                discount: discount,
                total: total,
                payment: formData.get('payment') === 'Online' ? 'Credit Card (Visa)' : 'Cash',
                addon: addonMap[formData.get('addons')],
                status: 'PAID'
            };

            orders.unshift(order);
            localStorage.setItem('makarios_orders', JSON.stringify(orders));

            const waMessage = `*MAKARIOS CAKES* 🍰\n` +
                              `_Taste the Delicious cakes now_\n` +
                              `------------------------------\n` +
                              `*Order id:* ${order.id}\n` +
                              `*Cake name:* ${order.items.map(i => i.name).join(', ')}\n` +
                              `*Quantity:* ${order.items.reduce((s, i) => s + i.qty, 0)}\n` +
                              `*Add ons:* ${order.addon || 'None'}\n` +
                              `*Cost:* ₹${order.subtotal.toLocaleString()}.00\n` +
                              `*Discount:* -₹${order.discount.toLocaleString()}.00\n` +
                              `------------------------------\n` +
                              `*Total cost: ₹${order.total.toLocaleString()}.00*\n` +
                              `------------------------------\n` +
                              `*Customer name:* ${order.customer}\n` +
                              `*Phone number:* ${order.phone}\n` +
                              `*Address or location:* ${order.location}\n` +
                              `*Payment type:* ${order.payment}\n` +
                              `*Payment status:* ${order.status}\n` +
                              `------------------------------\n` +
                              `Thank you for your order! Enjoy your cake! Visit again soon.`;

            const waUrl = `https://wa.me/${order.phone}?text=${encodeURIComponent(waMessage)}`;
            cart = [];
            updateCartUI();
            showPage('success', { order, waUrl });
        }

        function renderSuccess(container, { order, waUrl }) {
            container.innerHTML = `
                <div class="max-w-xl mx-auto text-center py-20 px-6 animate-in zoom-in duration-500">
                    <div class="w-24 h-24 bg-brand-gold/10 text-brand-gold rounded-full flex items-center justify-center mx-auto mb-10 border-4 border-brand-gold/20">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h2 class="text-4xl font-brand font-bold mb-4">Order Booked!</h2>
                    <p class="text-gray-400 mb-12">Receipt generated for <b>#${order.id}</b>. Sending digital copy via WhatsApp.</p>
                    <div class="grid gap-4">
                        <button onclick="downloadPDF('${order.id}')" class="w-full bg-brand-purple text-white py-5 rounded-2xl font-bold uppercase tracking-widest flex items-center justify-center gap-3">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                            Download Receipt
                        </button>
                        <a href="${waUrl}" target="_blank" class="w-full bg-[#25D366] text-white py-5 rounded-2xl font-bold uppercase tracking-widest flex items-center justify-center gap-3">
                             Send Receipt to WhatsApp
                        </a>
                        <button onclick="showPage('home')" class="mt-6 text-brand-gold font-bold uppercase text-[10px] tracking-widest hover:underline">Return to Inventory</button>
                    </div>
                </div>
            `;
        }

        function downloadPDF(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: [80, 200] });

            doc.setFont('Courier', 'bold');
            doc.setFontSize(16);
            doc.text('MAKARIOS CAKES', 40, 15, { align: 'center' });
            doc.setFont('Courier', 'italic');
            doc.setFontSize(10);
            doc.text('Taste the Delicious cakes now', 40, 20, { align: 'center' });
            doc.setFont('Courier', 'normal');
            doc.text('------------------------------', 40, 25, { align: 'center' });

            let y = 32;
            doc.setFontSize(9);
            doc.text(`Order id: ${order.id}`, 5, y); y += 6;
            doc.text(`Cake name: ${order.items[0].name}`, 5, y); y += 6;
            if(order.items.length > 1) { doc.text(`& others`, 5, y); y += 6; }
            doc.text(`Quantity: ${order.items.reduce((s,i)=>s+i.qty, 0)}`, 5, y); y += 6;
            doc.text(`Add ons: ${order.addon || 'None'}`, 5, y); y += 6;
            doc.text(`Cost: ${order.subtotal.toLocaleString()}.00`, 5, y); y += 6;
            doc.text(`Discount: -${order.discount.toLocaleString()}.00`, 5, y); y += 6;
            
            y += 2;
            doc.text('------------------------------', 40, y, { align: 'center' }); y += 6;
            doc.setFontSize(11);
            doc.setFont('Courier', 'bold');
            doc.text(`Total cost: ${order.total.toLocaleString()}.00`, 5, y); y += 6;
            doc.setFont('Courier', 'normal');
            doc.setFontSize(9);
            doc.text('------------------------------', 40, y, { align: 'center' }); y += 8;

            doc.text(`Customer name: ${order.customer}`, 5, y); y += 6;
            doc.text(`Phone number: ${order.phone}`, 5, y); y += 6;
            doc.text(`Address or location: ${order.location}`, 5, y, { maxWidth: 70 }); y += 12;
            doc.text(`Payment type: ${order.payment}`, 5, y); y += 6;
            doc.text(`Payment status: ${order.status}`, 5, y); y += 6;
            
            y += 2;
            doc.text('------------------------------', 40, y, { align: 'center' }); y += 8;
            doc.text('Thank you for your order! Enjoy', 40, y, { align: 'center' }); y += 5;
            doc.text('your cake! Visit again soon.', 40, y, { align: 'center' });

            doc.save(`Receipt_${order.id}.pdf`);
        }

        function renderCheckout(container) {
            const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const discount = subtotal > 2000 ? subtotal * 0.1 : 0;
            const total = subtotal + 150 - discount;
            container.innerHTML = `
                <div class="max-w-6xl mx-auto">
                    <h2 class="text-3xl font-brand font-bold mb-10">New Booking Details</h2>
                    <form onsubmit="handlePlaceOrder(event)" class="grid md:grid-cols-2 gap-12">
                        <div class="space-y-6">
                            <input type="text" name="name" placeholder="Customer Full Name" required class="w-full p-5 bg-white rounded-3xl border-none outline-none shadow-sm focus:ring-2 focus:ring-brand-gold">
                            <input type="tel" name="phone" placeholder="Phone (WhatsApp Number)" required class="w-full p-5 bg-white rounded-3xl border-none outline-none shadow-sm focus:ring-2 focus:ring-brand-gold">
                            <textarea name="location" placeholder="Full Address / Location Details" rows="3" required class="w-full p-5 bg-white rounded-3xl border-none outline-none shadow-sm focus:ring-2 focus:ring-brand-gold"></textarea>
                            <div class="grid grid-cols-2 gap-4">
                                <select name="addons" class="w-full p-5 bg-white rounded-3xl border-none outline-none shadow-sm">
                                    <option value="none">Standard Package</option>
                                    <option value="candles">Candles Only</option>
                                    <option value="card">Card Only</option>
                                    <option value="full_kit">Frosting & Candles</option>
                                </select>
                                <select name="payment" class="w-full p-5 bg-white rounded-3xl border-none outline-none shadow-sm">
                                    <option value="Online">Online Payment</option>
                                    <option value="COD">Cash Payment</option>
                                </select>
                            </div>
                            <button type="submit" class="w-full bg-brand-purple text-white py-5 rounded-3xl font-bold uppercase tracking-widest shadow-xl">Confirm Order</button>
                        </div>
                        <div class="bg-white p-10 rounded-[2.5rem] shadow-xl h-fit border border-gray-50">
                            <h3 class="text-xl font-brand font-bold mb-6">Cost Breakdown</h3>
                            <div class="space-y-4 mb-8">
                                ${cart.map(i => `<div class="flex justify-between text-sm font-medium"><span>${i.name} (x${i.qty})</span><span>₹${(i.price*i.qty).toLocaleString()}</span></div>`).join('')}
                            </div>
                            <div class="pt-6 border-t border-dashed space-y-3">
                                <div class="flex justify-between text-xs text-gray-400"><span>Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
                                <div class="flex justify-between text-xs text-green-600"><span>Discount</span><span>-₹${discount.toLocaleString()}</span></div>
                                <div class="flex justify-between text-2xl font-brand font-bold pt-4"><span>Total Cost</span><span>₹${total.toLocaleString()}</span></div>
                            </div>
                        </div>
                    </form>
                </div>`;
        }

        function renderHistory(container) {
            container.innerHTML = `<h2 class="text-3xl font-brand font-bold mb-10">Order Log</h2>
                <div class="grid gap-4">
                    ${orders.length === 0 ? `<div class="py-20 text-center opacity-30 italic">No orders logged yet.</div>` : 
                    orders.map(o => `<div class="bg-white p-6 rounded-3xl border border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="text-left w-full md:w-auto"><span class="text-[9px] font-bold text-gray-400 uppercase">#${o.id}</span><h3 class="font-bold text-sm">${o.items.map(i=>i.name).join(', ')}</h3><p class="text-[10px] text-gray-400">${new Date(o.date).toLocaleDateString()} • ${o.customer}</p></div>
                        <div class="flex items-center gap-6"><span class="text-xl font-brand font-bold">₹${o.total.toLocaleString()}</span><button onclick="downloadPDF('${o.id}')" class="p-3 bg-gray-50 rounded-xl"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg></button></div>
                    </div>`).join('')}
                </div>`;
        }

        function renderAdmin(container) {
            const total = orders.reduce((s, o) => s + o.total, 0);
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                    <div class="bg-brand-purple p-10 rounded-[2.5rem] text-white shadow-xl"><span class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Lifetime Revenue</span><p class="text-5xl font-brand font-bold mt-2">₹${total.toLocaleString()}</p></div>
                    <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-gray-100"><span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Total Sales</span><p class="text-5xl font-brand font-bold mt-2">${orders.length}</p></div>
                </div>
                <div class="bg-white p-12 rounded-[3rem] border border-gray-100 shadow-xl">
                    <div class="flex justify-between items-center mb-10">
                        <h3 class="text-2xl font-brand font-bold">Sales Trends</h3>
                        <div class="flex bg-gray-100 p-1.5 rounded-2xl">
                            <button onclick="switchAdminTab('monthly')" class="px-6 py-2.5 rounded-xl text-[10px] uppercase font-bold tracking-widest transition-all ${activeAdminTab === 'monthly' ? 'tab-active' : 'text-gray-400'}">Monthly</button>
                            <button onclick="switchAdminTab('yearly')" class="px-6 py-2.5 rounded-xl text-[10px] uppercase font-bold tracking-widest transition-all ${activeAdminTab === 'yearly' ? 'tab-active' : 'text-gray-400'}">Yearly</button>
                        </div>
                    </div>
                    <div class="h-[400px] w-full"><canvas id="adminChart"></canvas></div>
                </div>`;
            initAdminChart();
        }

        function switchAdminTab(tab) { activeAdminTab = tab; renderAdmin(document.getElementById('main-content')); }

        function initAdminChart() {
            const ctx = document.getElementById('adminChart');
            if(!ctx) return;
            new Chart(ctx, {
                type: activeAdminTab === 'monthly' ? 'line' : 'bar',
                data: {
                    labels: activeAdminTab === 'monthly' ? ['Week 1', 'Week 2', 'Week 3', 'Week 4'] : ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{ label: 'Revenue (₹)', data: activeAdminTab === 'monthly' ? [12000, 19000, 15000, 22000] : [80000, 95000, 110000, 105000, 130000, 145000], backgroundColor: '#3D1C2A', borderColor: '#B88E2F', borderWidth: 2, tension: 0.4 }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        }

        function toggleMobileMenu() { const m = document.getElementById('mobile-menu'); m.classList.toggle('hidden'); m.classList.toggle('flex'); }

        // Home is default page
        window.onload = () => showPage('home');
    </script>
</body>
</html>
