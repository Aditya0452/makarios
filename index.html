<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makarios Cakes - Owner Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <!-- jsPDF & Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-purple: #3D1C2A;
            --brand-gold: #B88E2F;
            --brand-cream: #FDFBF7;
            --success-green: #D1FAE5;
            --success-text: #065F46;
        }
        body { font-family: 'Poppins', sans-serif; background-color: var(--brand-cream); color: var(--brand-purple); -webkit-tap-highlight-color: transparent; }
        .font-brand { font-family: 'Playfair+Display', serif; }
        .bg-brand-purple { background-color: var(--brand-purple); }
        .text-brand-purple { color: var(--brand-purple); }
        .bg-brand-gold { background-color: var(--brand-gold); }
        .cake-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .cake-card:hover { transform: translateY(-4px); }
        #cart-sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .toast-hidden { transform: translate(-50%, -150%) scale(0.5); opacity: 0; pointer-events: none; }
        .toast-visible { transform: translate(-50%, 0) scale(1); opacity: 1; pointer-events: auto; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-overlay { background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--brand-gold); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .input-error { border: 2px solid #ef4444 !important; background-color: #fef2f2 !important; }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">

    <!-- Loading Screen -->
    <div id="app-loader" class="fixed inset-0 z-[300] bg-white flex items-center justify-center transition-opacity duration-500">
        <div class="text-center">
            <div class="loader mx-auto mb-4 w-12 h-12"></div>
            <p class="text-xs uppercase font-bold tracking-widest text-brand-gold animate-pulse">Makarios Cloud Syncing...</p>
        </div>
    </div>

    <!-- Main Navigation -->
    <nav id="main-nav" class="hidden sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 px-4 py-3 md:px-10 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3 cursor-pointer" onclick="showPage('home')">
            <img src="logo.png" alt="Logo" class="w-10 h-10 md:w-16 md:h-16 object-contain" onerror="this.src='https://via.placeholder.com/50?text=Logo'">
            <h1 class="text-lg md:text-2xl font-brand font-bold tracking-tight hidden sm:block">Makarios <span class="text-brand-gold font-normal text-[10px] block -mt-1 uppercase tracking-[0.3em]">Cakes</span></h1>
        </div>
        
        <div class="hidden lg:flex gap-8 items-center text-[10px] font-bold uppercase tracking-[0.2em]">
            <button onclick="showPage('home')" class="hover:text-brand-gold transition-colors py-1">Inventory</button>
            <button onclick="showPage('history')" class="hover:text-brand-gold transition-colors py-1">Order Log</button>
            <button onclick="showPage('admin')" class="hover:text-brand-gold transition-colors py-1">Analytics</button>
            <button onclick="handleLogout()" class="text-red-400 hover:text-red-600 transition-colors ml-4 border-l pl-4 border-gray-200">Logout</button>
        </div>

        <div class="flex items-center gap-3">
            <button onclick="toggleCart()" class="relative p-2.5 hover:bg-gray-100 rounded-full transition-all group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                <span id="cart-count" class="absolute top-1 right-1 bg-brand-gold text-white text-[9px] font-bold h-5 w-5 flex items-center justify-center rounded-full border-2 border-white">0</span>
            </button>
            <button class="lg:hidden p-2" onclick="toggleMobileMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
            </button>
        </div>
    </nav>

    <!-- Mobile Navigation -->
    <div id="mobile-menu" class="hidden fixed inset-0 z-[100] bg-white p-10 flex-col gap-8 text-center text-lg uppercase font-medium tracking-widest animate-in fade-in duration-300">
        <button onclick="showPage('home'); toggleMobileMenu()">Inventory</button>
        <button onclick="showPage('history'); toggleMobileMenu()">Orders</button>
        <button onclick="showPage('admin'); toggleMobileMenu()">Dashboard</button>
        <button onclick="handleLogout(); toggleMobileMenu()" class="text-red-500">Sign Out</button>
        <button onclick="toggleMobileMenu()" class="mt-auto text-brand-gold font-bold p-4 border border-brand-gold rounded-full text-sm">Close Menu</button>
    </div>

    <!-- Content Container -->
    <main id="main-content" class="p-4 md:p-8 lg:p-12 max-w-[1400px] mx-auto min-h-[80vh]"></main>

    <!-- Product Modal -->
    <div id="product-modal" class="hidden fixed inset-0 z-[150] modal-overlay flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-6 md:p-8 shadow-2xl my-auto animate-in zoom-in duration-300">
            <h2 id="modal-title" class="text-2xl font-brand font-bold mb-6 flex justify-between items-center text-brand-purple">Add New Cake<button onclick="closeProductModal()" class="text-gray-300 hover:text-red-500">&times;</button></h2>
            <form id="product-form" onsubmit="handleProductSubmit(event)" class="space-y-4">
                <input type="hidden" id="modal-product-id">
                <div>
                    <label class="text-[9px] font-bold uppercase tracking-widest text-gray-400 ml-4 mb-1 block">Cake Name</label>
                    <input type="text" id="modal-name" placeholder="E.g. Butter Scotch" required class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand-gold">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[9px] font-bold uppercase tracking-widest text-gray-400 ml-4 mb-1 block">Price (₹)</label>
                        <input type="number" id="modal-price" placeholder="1049" required class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand-gold">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold uppercase tracking-widest text-gray-400 ml-4 mb-1 block">Category</label>
                        <select id="modal-category" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand-gold">
                            <option value="Signature">Signature</option><option value="Fresh">Fresh</option><option value="Classic">Classic</option><option value="Premium">Premium</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-[9px] font-bold uppercase tracking-widest text-gray-400 ml-4 mb-1 block">Description</label>
                    <textarea id="modal-desc" placeholder="Details about the cake..." rows="2" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand-gold"></textarea>
                </div>
                <div>
                    <label class="text-[9px] font-bold uppercase tracking-widest text-gray-400 ml-4 mb-1 block">Cake Photo</label>
                    <div class="relative w-full h-24 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200 flex flex-col items-center justify-center overflow-hidden">
                        <span id="file-name-label" class="text-[10px] text-gray-400">Select Image from Device</span>
                        <input type="file" id="product-img-file" accept="image/*" onchange="previewFile()" class="absolute inset-0 opacity-0 cursor-pointer">
                        <img id="file-preview" class="absolute inset-0 w-full h-full object-cover hidden">
                    </div>
                </div>
                <div class="flex gap-4 pt-2">
                    <button type="button" onclick="closeProductModal()" class="flex-1 bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold uppercase text-[10px] tracking-widest hover:bg-gray-200 transition-all">Cancel</button>
                    <button type="submit" id="save-product-btn" class="flex-[2] bg-brand-purple text-white py-4 rounded-2xl font-bold uppercase text-[10px] tracking-widest shadow-xl hover:bg-brand-gold transition-all">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Booking Sidebar -->
    <div id="cart-overlay" class="hidden fixed inset-0 bg-black/40 backdrop-blur-[2px] z-[60]" onclick="toggleCart()"></div>
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full sm:w-[450px] bg-white z-[70] shadow-2xl transform translate-x-full flex flex-col">
        <div class="p-8 border-b border-gray-100 flex justify-between items-center"><div><h2 class="text-2xl font-brand font-bold text-brand-purple">Booking Bin</h2><p class="text-[10px] text-gray-400 uppercase tracking-widest">Selected Items</p></div><button onclick="toggleCart()" class="text-3xl text-gray-300 hover:text-brand-purple">&times;</button></div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-8 space-y-6 no-scrollbar"></div>
        <div class="p-8 bg-gray-50 border-t border-gray-100"><div class="flex justify-between items-center mb-6"><span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Total Selection</span><span id="cart-total" class="text-3xl font-brand font-bold">₹0</span></div><button onclick="goToCheckout()" class="w-full bg-brand-purple text-white py-5 rounded-2xl font-bold uppercase tracking-[0.2em] shadow-xl">Process Order</button></div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast-hidden fixed top-24 left-1/2 -translate-x-1/2 z-[400] bg-brand-purple text-white px-8 py-4 rounded-full shadow-2xl flex items-center gap-3 font-semibold transition-all"><span id="toast-msg">Success!</span></div>

    <script>
        // --- 1. Firebase Initialization ---
        const firebaseConfig = {
            apiKey: "AIzaSyAQ32RbkE4Xx6zASWPcecNYrEiYeFl3VOw",
            authDomain: "makarios-2025.firebaseapp.com",
            projectId: "makarios-2025",
            storageBucket: "makarios-2025.firebasestorage.app",
            messagingSenderId: "702054601448",
            appId: "1:702054601448:web:ac1beffac72f101127af5d",
            measurementId: "G-E1LNEXHPFP"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'makarios-2025';

        // --- 2. Menu Seed Data ---
        const defaultMenu = [
            { name: "Butter Scotch", price: 1049, category: "Signature", desc: "1kg - Classic crunch", img: 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=400' },
            { name: "Vanilla", price: 949, category: "Classic", desc: "1kg - Pure Madagascar vanilla", img: 'https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?w=400' },
            { name: "Strawberry", price: 1249, category: "Fresh", desc: "1kg - Fresh berry compote", img: 'https://images.unsplash.com/photo-1586788680434-30d324b2d46f?w=400' },
            { name: "Exotic Fruit", price: 1349, category: "Premium", desc: "1kg - Medley of seasonal fruits", img: 'https://images.unsplash.com/photo-1535141192574-5d4897c12636?w=400' },
            { name: "Rich Chocolate", price: 1349, category: "Premium", desc: "1kg - Pure belgian cocoa", img: 'https://images.unsplash.com/photo-1606312619070-d48b4c652a52?w=400' }
        ];

        // --- 3. App State ---
        let currentUser = null;
        let cakes = [];
        let orders = [];
        let cart = [];
        let activePage = 'login';
        let toastTimer;
        let hasCheckedSeeding = false;

        function hideLoader() {
            const loader = document.getElementById('app-loader');
            if (loader) loader.classList.add('hidden');
        }

        // --- 4. Core Lifecycle ---
        async function initApp() {
            setTimeout(() => hideLoader(), 5000); // Safety timeout

            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    currentUser = user;
                    document.getElementById('main-nav').classList.remove('hidden');
                    
                    // RULE 1: Use Private User Paths to avoid permission issues
                    const userRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid);
                    const cakesRef = userRef.collection('cakes');
                    const ordersRef = userRef.collection('orders');

                    cakesRef.onSnapshot(async snap => {
                        cakes = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        
                        if (snap.empty && !hasCheckedSeeding) {
                            hasCheckedSeeding = true;
                            console.log("Empty inventory. Seeding defaults...");
                            for (let item of defaultMenu) { await cakesRef.add(item); }
                        }
                        
                        if (activePage === 'home') renderHome();
                        hideLoader();
                    }, err => {
                        console.error("Firebase Error:", err);
                        showToast(`Error: ${err.message}`);
                        hideLoader();
                    });

                    ordersRef.onSnapshot(snap => {
                        orders = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => new Date(b.date) - new Date(a.date));
                        if (activePage === 'history') renderHistory();
                    });

                    showPage('home');
                } else {
                    currentUser = null;
                    document.getElementById('main-nav').classList.add('hidden');
                    hideLoader();
                    showPage('login');
                }
            });
        }

        // --- 5. Authentication UI ---
        function renderAuth(mode = 'login', error = null) {
            const container = document.getElementById('main-content');
            const defaultUser = "Makarios.in";
            const defaultPass = "Makarios2025";

            container.innerHTML = `
                <div class="max-w-md mx-auto py-12 animate-in fade-in zoom-in duration-500">
                    <div class="text-center mb-10">
                        <img src="1000398562.jpg" class="w-24 h-24 mx-auto mb-6 object-contain">
                        <h2 class="text-4xl font-brand font-bold text-brand-purple">Owner Portal</h2>
                        <p class="text-gray-400 text-[10px] uppercase tracking-[0.3em] mt-1">Makarios Enterprises</p>
                    </div>
                    <form onsubmit="handleAuth(event, '${mode}')" class="bg-white p-10 rounded-[3rem] shadow-2xl space-y-6">
                        ${error ? `<div class="bg-red-50 text-red-500 p-4 rounded-2xl text-[10px] font-bold uppercase text-center border border-red-100">${error}</div>` : ''}
                        <div>
                            <label class="text-[9px] font-bold uppercase tracking-widest text-gray-400 ml-4 mb-1 block">Username / Email</label>
                            <input type="text" id="auth-user" required value="${mode === 'login' ? defaultUser : ''}" class="w-full p-5 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-brand-gold">
                        </div>
                        <div>
                            <label class="text-[9px] font-bold uppercase tracking-widest text-gray-400 ml-4 mb-1 block">Password</label>
                            <input type="password" id="auth-pass" required value="${mode === 'login' ? defaultPass : ''}" class="w-full p-5 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-brand-gold">
                        </div>
                        ${mode === 'signup' ? `
                        <div>
                            <label class="text-[9px] font-bold uppercase tracking-widest text-gray-400 ml-4 mb-1 block">Confirm Password</label>
                            <input type="password" id="auth-confirm" required class="w-full p-5 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-brand-gold">
                        </div>
                        ` : ''}
                        <button type="submit" id="auth-btn" class="w-full bg-brand-purple text-white py-5 rounded-2xl font-bold uppercase text-[11px] tracking-widest shadow-xl">
                            ${mode === 'login' ? 'Enter Dashboard' : 'Create Account'}
                        </button>
                    </form>
                    <p class="text-center mt-8 text-[11px] font-medium text-gray-400 uppercase tracking-widest">
                        ${mode === 'login' ? "Need to register?" : "Already an owner?"}
                        <button onclick="showPage('${mode === 'login' ? 'signup' : 'login'}')" class="text-brand-gold font-bold underline ml-1">${mode === 'login' ? 'Register Account' : 'Login Now'}</button>
                    </p>
                </div>`;
        }

        async function handleAuth(e, mode) {
            e.preventDefault();
            const btn = document.getElementById('auth-btn');
            const user = document.getElementById('auth-user').value;
            const pass = document.getElementById('auth-pass').value;
            const email = user.includes('@') ? user : `${user.toLowerCase()}@makarios-2025.in`;

            btn.disabled = true;
            btn.innerHTML = `<div class="loader mx-auto"></div>`;

            try {
                if (mode === 'signup') {
                    const confirm = document.getElementById('auth-confirm').value;
                    if (pass !== confirm) throw new Error("Passwords mismatch");
                    await auth.createUserWithEmailAndPassword(email, pass);
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
            } catch(err) {
                renderAuth(mode, "Check credentials and try again.");
            } finally {
                btn.disabled = false;
                btn.innerText = mode === 'login' ? 'Enter Dashboard' : 'Create Account';
            }
        }

        function handleLogout() { auth.signOut(); showPage('login'); }

        // --- 6. Navigation Control ---
        function showPage(page, data = null) {
            activePage = page;
            const container = document.getElementById('main-content');
            if (!currentUser && (page !== 'login' && page !== 'signup')) return renderAuth('login');
            if (page === 'login' || page === 'signup') return renderAuth(page);

            container.innerHTML = `<div class="flex justify-center py-20"><div class="loader"></div></div>`;
            setTimeout(() => {
                switch(page) {
                    case 'home': renderHome(); break;
                    case 'checkout': renderCheckout(); break;
                    case 'history': renderHistory(); break;
                    case 'admin': renderAdmin(); break;
                    case 'order-details': renderOrderDetails(data); break;
                    case 'success': renderSuccess(data); break;
                }
            }, 50);
        }

        function renderHome() {
            document.getElementById('main-content').innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
                    <div><h2 class="text-3xl md:text-5xl font-brand font-bold mb-2">Inventory</h2><p class="text-gray-400 uppercase tracking-widest text-[10px] font-bold">Owner Dashboard</p></div>
                    <button onclick="openProductModal()" class="w-full md:w-auto bg-brand-gold text-white px-8 py-4 rounded-2xl font-bold uppercase text-[11px] tracking-widest shadow-xl transition-transform hover:scale-105 active:scale-95">Add New Cake</button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                    ${cakes.map(p => `
                        <div class="cake-card bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-gray-100 p-4 flex flex-col group relative">
                            <button onclick="openProductModal('${p.id}')" class="absolute top-6 right-6 z-10 p-3 bg-white/90 backdrop-blur shadow-lg rounded-full text-brand-purple hover:bg-brand-purple hover:text-white transition-all">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-width="2.5"/></svg>
                            </button>
                            <div class="relative h-56 overflow-hidden rounded-[2rem] bg-gray-50"><img src="${p.img}" class="w-full h-full object-cover">
                                <div class="absolute bottom-3 left-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[8px] font-bold uppercase tracking-widest">${p.category}</div>
                            </div>
                            <div class="p-3 mt-4 flex flex-col flex-1">
                                <h3 class="text-lg font-bold mb-1 font-brand">${p.name}</h3>
                                <p class="text-gray-400 text-[10px] leading-relaxed mb-6 line-clamp-2">${p.desc}</p>
                                <div class="mt-auto flex items-center justify-between"><span class="text-xl font-bold text-brand-purple">₹${p.price.toLocaleString()}</span>
                                    <button onclick="addToCart('${p.id}')" class="bg-brand-purple text-white px-6 py-2.5 rounded-xl font-bold text-[9px] uppercase tracking-widest shadow-lg active:scale-95">Add to Order</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
        }

        // --- 7. Modal & Submission Logic ---
        function openProductModal(id = null) {
            const modal = document.getElementById('product-modal');
            modal.classList.remove('hidden');
            if (id) {
                const p = cakes.find(x => x.id === id);
                document.getElementById('modal-title').innerText = "Edit Item";
                document.getElementById('modal-product-id').value = p.id;
                document.getElementById('modal-name').value = p.name;
                document.getElementById('modal-price').value = p.price;
                document.getElementById('modal-category').value = p.category;
                document.getElementById('modal-desc').value = p.desc;
                document.getElementById('file-preview').src = p.img;
                document.getElementById('file-preview').classList.remove('hidden');
                document.getElementById('file-name-label').classList.add('hidden');
            } else {
                document.getElementById('modal-title').innerText = "Add Cake";
                document.getElementById('product-form').reset();
                document.getElementById('modal-product-id').value = "";
                document.getElementById('file-preview').classList.add('hidden');
                document.getElementById('file-name-label').classList.remove('hidden');
            }
        }

        function closeProductModal() { document.getElementById('product-modal').classList.add('hidden'); }

        async function handleProductSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('save-product-btn');
            btn.disabled = true; btn.innerHTML = `<div class="loader mx-auto"></div>`;

            const id = document.getElementById('modal-product-id').value;
            const data = {
                name: document.getElementById('modal-name').value,
                price: parseInt(document.getElementById('modal-price').value),
                category: document.getElementById('modal-category').value,
                desc: document.getElementById('modal-desc').value,
                img: document.getElementById('file-preview').src
            };

            const ref = db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('cakes');
            try {
                if (id) await ref.doc(id).update(data);
                else await ref.add(data);
                closeProductModal();
                showToast("Saved Successfully");
            } catch(e) { showToast("Save failed"); }
            finally { btn.disabled = false; btn.innerText = "Save Changes"; }
        }

        // --- 8. Order UI Fragments ---
        function renderCheckout() {
            const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('main-content').innerHTML = `
                <div class="max-w-6xl mx-auto animate-in slide-in-from-bottom duration-500">
                    <h2 class="text-3xl font-brand font-bold mb-10 text-brand-purple">Order Entry</h2>
                    <form id="order-form" class="grid lg:grid-cols-2 gap-12">
                        <div class="space-y-6">
                            <input type="text" id="cust-name" placeholder="Customer Name" required class="w-full p-5 bg-white rounded-3xl shadow-sm outline-none focus:ring-2 focus:ring-brand-gold">
                            <input type="tel" id="cust-phone" placeholder="WhatsApp Number" required class="w-full p-5 bg-white rounded-3xl shadow-sm outline-none focus:ring-2 focus:ring-brand-gold">
                            <textarea id="cust-location" rows="3" placeholder="Address" required class="w-full p-5 bg-white rounded-3xl shadow-sm outline-none focus:ring-2 focus:ring-brand-gold"></textarea>
                            <div class="grid grid-cols-2 gap-4">
                                <select id="cust-package" class="p-5 bg-white rounded-3xl shadow-sm outline-none"><option value="Standard">Standard</option><option value="Celebration">Celebration</option></select>
                                <select id="cust-payment" class="p-5 bg-white rounded-3xl shadow-sm outline-none"><option value="Online">Online</option><option value="Cash">Cash</option></select>
                            </div>
                            <div class="relative"><span class="absolute left-5 top-5 text-brand-gold font-bold text-sm">Discount ₹</span>
                                <input type="number" id="cust-discount" value="0" oninput="calculateTotal()" class="w-full p-5 pl-28 bg-white rounded-3xl shadow-sm border-2 border-brand-gold/10 outline-none focus:border-brand-gold">
                            </div>
                            <button type="button" onclick="finalizeOrder()" class="w-full bg-brand-purple text-white py-6 rounded-3xl font-bold uppercase tracking-[0.2em] shadow-2xl active:scale-95">Confirm Order</button>
                        </div>
                        <div class="bg-white p-10 rounded-[3.5rem] shadow-xl h-fit border border-gray-50">
                            <h3 class="text-xl font-brand font-bold mb-8">Summary</h3>
                            <div class="space-y-5 mb-8 max-h-60 overflow-y-auto no-scrollbar">${cart.map(i => `<div class="flex justify-between text-sm"><span>${i.name} (x${i.qty})</span><span class="font-bold">₹${(i.price*i.qty).toLocaleString()}</span></div>`).join('')}</div>
                            <div class="pt-8 border-t border-dashed space-y-4">
                                <div class="flex justify-between text-xs text-gray-400 uppercase"><span>Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
                                <div class="flex justify-between text-xs text-red-500 font-bold uppercase"><span>Discount</span><span id="bill-discount">-₹0</span></div>
                                <div class="flex justify-between text-3xl font-brand font-bold pt-6 text-brand-purple border-t"><span>Total</span><span id="bill-total">₹${subtotal.toLocaleString()}</span></div>
                            </div>
                        </div>
                    </form>
                </div>`;
        }

        async function finalizeOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const sub = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const disc = parseInt(document.getElementById('cust-discount').value) || 0;
            if (!name || !phone) return showToast("Enter Name and Phone");

            const order = {
                date: new Date().toISOString(), customer: name, phone: phone, 
                location: document.getElementById('cust-location').value,
                packageType: document.getElementById('cust-package').value,
                paymentType: document.getElementById('cust-payment').value,
                discount: disc, subtotal: sub, total: sub - disc,
                items: cart, status: 'PAID'
            };

            try {
                const ref = await db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('orders').add(order);
                const waUrl = `https://wa.me/91${phone}?text=${encodeURIComponent("*MAKARIOS CAKES RECEIPT*\nID: #" + ref.id.slice(-6).toUpperCase() + "\nTotal: ₹" + (sub - disc).toLocaleString())}`;
                cart = []; updateCartUI();
                showPage('success', { order: { id: ref.id, ...order }, waUrl });
            } catch(e) { showToast("Sync Failed"); }
        }

        function calculateTotal() {
            const sub = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const disc = parseInt(document.getElementById('cust-discount').value) || 0;
            document.getElementById('bill-discount').innerText = `-₹${disc.toLocaleString()}`;
            document.getElementById('bill-total').innerText = `₹${(sub - disc).toLocaleString()}`;
        }

        // --- 9. Utility Functions ---
        function addToCart(id) { const c = cakes.find(x => x.id === id); const ex = cart.find(x => x.id === id); if(ex) ex.qty++; else cart.push({...c, qty: 1}); updateCartUI(); showToast(`Added`); }
        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0);
            const list = document.getElementById('cart-items'); if (!list) return;
            if (cart.length === 0) { list.innerHTML = `<div class="py-20 opacity-20 italic text-center">Bin is Empty</div>`; document.getElementById('cart-total').innerText = "₹0"; return; }
            list.innerHTML = cart.map(i => `<div class="flex gap-4"><img src="${i.img}" class="w-16 h-16 rounded-2xl object-cover"><div class="flex-1"><h4 class="font-bold text-xs">${i.name}</h4><div class="flex justify-between items-center"><div class="flex items-center gap-3 bg-gray-50 rounded-lg p-1 px-3"><button onclick="changeQty('${i.id}',-1)">-</button><span>${i.qty}</span><button onclick="changeQty('${i.id}',1)">+</button></div><span class="font-bold text-xs">₹${(i.price*i.qty).toLocaleString()}</span></div></div></div>`).join('');
            document.getElementById('cart-total').innerText = `₹${cart.reduce((s,i)=>s+(i.price*i.qty),0).toLocaleString()}`;
        }
        function changeQty(id, d) { const i = cart.find(x => x.id === id); i.qty += d; if(i.qty <= 0) cart = cart.filter(x => x.id !== id); updateCartUI(); }
        function showToast(m) { const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = m; t.classList.add('toast-visible'); t.classList.remove('toast-hidden'); if(toastTimer) clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.add('toast-hidden'), 3000); }
        function toggleCart() { const sb = document.getElementById('cart-sidebar'); const ov = document.getElementById('cart-overlay'); if(sb.classList.contains('translate-x-0')){sb.classList.add('translate-x-full'); sb.classList.remove('translate-x-0'); ov.classList.add('hidden');} else {sb.classList.remove('translate-x-full'); sb.classList.add('translate-x-0'); ov.classList.remove('hidden'); updateCartUI();} }
        function goToCheckout() { if(cart.length>0){toggleCart(); showPage('checkout');} }
        function previewFile() { const file = document.getElementById('product-img-file').files[0]; const r = new FileReader(); r.onload = e => { document.getElementById('file-preview').src = e.target.result; document.getElementById('file-preview').classList.remove('hidden'); document.getElementById('file-name-label').classList.add('hidden'); }; r.readAsDataURL(file); }
        function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); document.getElementById('mobile-menu').classList.toggle('flex'); }

        function renderHistory() {
            document.getElementById('main-content').innerHTML = `
                <h2 class="text-4xl font-brand font-bold mb-10 text-brand-purple">Order Archive</h2>
                <div class="grid gap-4">${orders.map(o => `
                    <div class="bg-white p-6 rounded-[2rem] border border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4 hover:shadow-md cursor-pointer group" onclick="showPage('order-details', '${o.id}')">
                        <div class="text-left w-full md:w-auto"><span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">#${o.id.slice(-6)}</span><h3 class="font-bold text-base group-hover:text-brand-gold transition-colors">${o.customer}</h3><p class="text-[10px] text-gray-400">${new Date(o.date).toLocaleDateString()}</p></div>
                        <div class="flex items-center gap-6"><span class="text-2xl font-brand font-bold">₹${o.total.toLocaleString()}</span><button onclick="event.stopPropagation(); downloadPDF('${o.id}')" class="p-3 bg-gray-50 rounded-xl hover:bg-brand-purple hover:text-white transition-all"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke-width="2"/></svg></button></div>
                    </div>`).join('')}</div>`;
        }

        function renderAdmin() {
            const total = orders.reduce((s,o) => s + o.total, 0);
            document.getElementById('main-content').innerHTML = `
                <div class="grid md:grid-cols-2 gap-8 mb-12">
                    <div class="bg-brand-purple p-10 rounded-[3rem] text-white shadow-2xl"><span class="text-[10px] uppercase font-bold opacity-50">Gross Revenue</span><p class="text-5xl font-brand font-bold mt-2">₹${total.toLocaleString()}</p></div>
                    <div class="bg-white p-10 rounded-[3rem] border border-gray-100 shadow-sm"><span class="text-[10px] font-bold text-gray-400">Total Sales</span><p class="text-5xl font-brand font-bold mt-2">${orders.length}</p></div>
                </div>
                <div class="bg-white p-10 rounded-[3rem] border border-gray-100 shadow-xl h-[450px]"><h3 class="text-2xl font-brand font-bold mb-10 text-brand-purple">Sales Trends</h3><canvas id="perfChart"></canvas></div>`;
            const canvas = document.getElementById('perfChart');
            if (canvas) new Chart(canvas.getContext('2d'), { type: 'line', data: { labels: orders.slice(0, 10).reverse().map(o => o.id.slice(-4)), datasets: [{ label: 'Order Value', data: orders.slice(0, 10).reverse().map(o => o.total), borderColor: '#B88E2F', tension: 0.4 }] }, options: { maintainAspectRatio: false } });
        }

        function renderSuccess(d) {
            document.getElementById('main-content').innerHTML = `
                <div class="max-w-md mx-auto py-20 text-center animate-in zoom-in duration-500">
                    <div class="w-20 h-20 bg-green-50 text-green-600 rounded-full flex items-center justify-center mx-auto mb-8"><svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3"/></svg></div>
                    <h2 class="text-4xl font-brand font-bold mb-4">Confirmed!</h2>
                    <p class="text-gray-400 mb-10 font-medium tracking-wide">Order #${d.order.id.slice(-6).toUpperCase()} generated.</p>
                    <div class="space-y-4">
                        <a href="${d.waUrl}" target="_blank" class="block w-full bg-[#25D366] text-white py-5 rounded-3xl font-bold uppercase text-[11px] tracking-widest shadow-lg text-center">WhatsApp Receipt</a>
                        <button onclick="downloadPDF('${d.order.id}')" class="block w-full bg-brand-purple text-white py-5 rounded-3xl font-bold uppercase text-[11px] tracking-widest shadow-lg">Save PDF bill</button>
                        <button onclick="showPage('home')" class="block w-full text-brand-gold font-bold uppercase text-[10px] underline pt-4">Return Home</button>
                    </div>
                </div>`;
        }

        function downloadPDF(id) {
            const o = orders.find(x => x.id === id);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: [100, 200] });
            doc.setFillColor(61, 28, 42); doc.rect(0, 0, 100, 45, 'F');
            doc.setTextColor(255); doc.setFontSize(22); doc.setFont(undefined, 'bold');
            doc.text('MAKARIOS', 50, 22, { align: 'center' });
            doc.setFontSize(10); doc.setFont(undefined, 'normal');
            doc.text('OFFICIAL BILL RECEIPT', 50, 32, { align: 'center' });
            doc.setTextColor(0); doc.setFontSize(9);
            doc.text(`Invoice: #${o.id.slice(-6).toUpperCase()}`, 10, 60);
            doc.text(`Customer: ${o.customer}`, 10, 70);
            doc.text(`Paid: INR ${o.total.toLocaleString()}`, 10, 80);
            doc.save(`Makarios_Receipt_${o.id.slice(-6)}.pdf`);
        }

        initApp();
    </script>
</body>
</html>
