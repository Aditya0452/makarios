<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makarios Cakes - Owner Dashboard</title>
    <link rel="icon" type="image/x-icon" src="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs (Compatibility Version) -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <!-- PDF & Charts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-purple: #3D1C2A;
            --brand-gold: #B88E2F;
            --brand-cream: #FDFBF7;
            --island-green: #D1FAE5;
            --island-text: #065F46;
        }
        body { font-family: 'Poppins', sans-serif; background-color: var(--brand-cream); color: var(--brand-purple); -webkit-tap-highlight-color: transparent; }
        .font-brand { font-family: 'Playfair+Display', serif; }
        .bg-brand-purple { background-color: var(--brand-purple); }
        .bg-brand-gold { background-color: var(--brand-gold); }
        
        .cake-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 2rem; overflow: hidden; background: white; border: 1px solid #f3f4f6; }
        .cake-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05); }
        
        #cart-sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .toast-container { 
            position: fixed;
            top: 20px;
            left: 50%;
            z-index: 500;
            white-space: nowrap; 
            max-width: calc(100vw - 40px); 
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-hidden { transform: translate(-50%, -120%) scale(0.6); opacity: 0; pointer-events: none; filter: blur(4px); }
        .toast-visible { transform: translate(-50%, 0) scale(1); opacity: 1; pointer-events: auto; filter: blur(0); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-overlay { background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--brand-gold); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">

    <!-- Loading Screen -->
    <div id="app-loader" class="fixed inset-0 z-[300] bg-white flex items-center justify-center transition-opacity duration-500">
        <div class="text-center">
            <div class="loader mx-auto mb-4 w-12 h-12"></div>
            <p class="text-xs uppercase font-bold tracking-widest text-brand-gold animate-pulse">Syncing Makarios Cloud...</p>
        </div>
    </div>

    <!-- Navigation -->
    <nav id="main-nav" class="hidden sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 px-4 py-3 md:px-10 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3 cursor-pointer" onclick="showPage('home')">
            <img src="logo.png" id="brand-logo-img" alt="Logo" class="w-18 h-12 md:w-16 md:h-16 object-contain" onerror="this.src='https://via.placeholder.com/50?text=Logo'">
            <h1 class="text-lg md:text-2xl font-brand font-bold tracking-tight hidden sm:block text-brand-purple">Makarios <span class="text-brand-gold font-normal text-[10px] block -mt-1 uppercase tracking-[0.3em]">Cakes</span></h1>
        </div>
        
        <div class="hidden lg:flex gap-8 items-center text-[10px] font-bold uppercase tracking-[0.2em]">
            <button onclick="showPage('home')" class="hover:text-brand-gold transition-colors py-1">Inventory</button>
            <button onclick="showPage('history')" class="hover:text-brand-gold transition-colors py-1">Orders</button>
            <button onclick="showPage('admin')" class="hover:text-brand-gold transition-colors py-1">Earnings</button>
            <button onclick="handleLogout()" class="text-red-400 hover:text-red-600 transition-colors ml-4 border-l pl-4 border-gray-200">Logout</button>
        </div>

        <div class="flex items-center gap-3">
            <button onclick="toggleCart()" class="relative p-2.5 hover:bg-gray-100 rounded-full transition-all group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                <span id="cart-count" class="absolute top-1 right-1 bg-brand-gold text-white text-[9px] font-bold h-5 w-5 flex items-center justify-center rounded-full border-2 border-white">0</span>
            </button>
            <button class="lg:hidden p-2" onclick="toggleMobileMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
            </button>
        </div>
    </nav>

    <!-- Mobile Navigation -->
    <div id="mobile-menu" class="hidden fixed inset-0 z-[100] bg-white p-10 flex-col gap-8 text-center text-lg uppercase font-medium tracking-widest animate-in fade-in duration-300">
        <button onclick="showPage('home'); toggleMobileMenu()">Inventory</button>
        <button onclick="showPage('history'); toggleMobileMenu()">Orders</button>
        <button onclick="showPage('admin'); toggleMobileMenu()">Earnings</button>
        <button onclick="handleLogout(); toggleMobileMenu()" class="text-red-500">Sign Out</button>
        <button onclick="toggleMobileMenu()" class="mt-auto text-brand-gold font-bold p-4 border border-brand-gold rounded-full text-sm">Close</button>
    </div>

    <!-- Main Content -->
    <main id="main-content" class="p-4 md:p-8 lg:p-12 max-w-[1400px] mx-auto min-h-[80vh]"></main>

    <!-- Sidebar Booking Bin -->
    <div id="cart-overlay" class="hidden fixed inset-0 bg-black/40 backdrop-blur-[2px] z-[60]" onclick="toggleCart()"></div>
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full sm:w-[450px] bg-white z-[70] shadow-2xl transform translate-x-full flex flex-col">
        <div class="p-8 border-b border-gray-100 flex justify-between items-center"><div><h2 class="text-2xl font-brand font-bold text-brand-purple">Booking Bin</h2><p class="text-[10px] text-gray-400 uppercase tracking-widest">Selected Items</p></div><button onclick="toggleCart()" class="text-3xl text-gray-300 hover:text-brand-purple">&times;</button></div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-8 space-y-6 no-scrollbar"></div>
        <div class="p-8 bg-gray-50 border-t border-gray-100">
            <div class="flex justify-between items-center mb-6"><span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Current Subtotal</span><span id="cart-total" class="text-3xl font-brand font-bold">₹0</span></div>
            <button onclick="goToCheckout()" class="w-full bg-brand-purple text-white py-5 rounded-2xl font-bold uppercase tracking-[0.2em] shadow-xl hover:bg-brand-gold transition-all active:scale-95">Process Order</button>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="hidden fixed inset-0 z-[150] modal-overlay flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-6 md:p-8 shadow-2xl my-auto animate-in zoom-in duration-300">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-2xl font-brand font-bold text-brand-purple">Manage Cake</h2>
                <button id="delete-cake-btn" onclick="handleDeleteProduct()" class="hidden p-3 bg-red-50 text-red-500 rounded-2xl hover:bg-red-500 hover:text-white transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                </button>
            </div>
            <form id="product-form" onsubmit="handleProductSubmit(event)" class="space-y-4">
                <input type="hidden" id="modal-product-id">
                <input type="text" id="modal-name" placeholder="Cake Name" required class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand-gold">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="modal-price" placeholder="Price (₹)" required class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand-gold">
                    <select id="modal-category" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand-gold">
                        <option value="Signature">Signature</option><option value="Fresh">Fresh</option><option value="Classic">Classic</option><option value="Premium">Premium</option>
                    </select>
                </div>
                <textarea id="modal-desc" placeholder="Short Details..." rows="2" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand-gold"></textarea>
                
                <div class="space-y-2">
                    <label class="text-[9px] font-bold uppercase tracking-widest text-gray-400 ml-4 block">Image Source</label>
                    <input type="url" id="modal-img-url" placeholder="Paste Image URL (Recommended)" oninput="previewFromUrl()" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand-gold text-xs">
                    
                    <div class="relative w-full h-32 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200 flex flex-col items-center justify-center overflow-hidden">
                        <span id="file-name-label" class="text-[10px] text-gray-400">Or Upload File</span>
                        <input type="file" id="product-img-file" accept="image/*" onchange="previewFile()" class="absolute inset-0 opacity-0 cursor-pointer">
                        <img id="file-preview" class="absolute inset-0 w-full h-full object-cover hidden">
                    </div>
                </div>

                <div class="flex gap-4 pt-2">
                    <button type="button" onclick="closeProductModal()" class="flex-1 bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold uppercase text-[10px] tracking-widest transition-all">Cancel</button>
                    <button type="submit" id="save-product-btn" class="flex-[2] bg-brand-purple text-white py-4 rounded-2xl font-bold uppercase text-[10px] tracking-widest shadow-xl hover:bg-brand-gold transition-all">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Apple Dynamic Island Toast -->
    <div id="toast" class="toast-hidden toast-container bg-[#D1FAE5] text-[#065F46] px-8 py-3 rounded-full flex items-center gap-3 font-semibold transition-all">
        <div class="w-5 h-5 bg-[#065F46] text-white rounded-full flex items-center justify-center text-[10px]">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="4"/></svg>
        </div>
        <span id="toast-msg" class="text-sm">Success!</span>
    </div>

    <script>
        // --- 1. Firebase Initialization ---
        const firebaseConfig = {
            apiKey: "AIzaSyAQ32RbkE4Xx6zASWPcecNYrEiYeFl3VOw",
            authDomain: "makarios-2025.firebaseapp.com",
            projectId: "makarios-2025",
            storageBucket: "makarios-2025.firebasestorage.app",
            messagingSenderId: "702054601448",
            appId: "1:702054601448:web:ac1beffac72f101127af5d",
            measurementId: "G-E1LNEXHPFP"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'makarios-2025';

        // --- 2. App State ---
        let user = null;
        let cakes = [];
        let orders = [];
        let cart = [];
        let activePage = 'login';
        let toastTimer;

        // --- 3. Initializer ---
        async function initApp() {
            setTimeout(() => { if (!document.getElementById('app-loader').classList.contains('hidden')) hideLoader(); }, 5000);

            auth.onAuthStateChanged(async (u) => {
                if (u) {
                    user = u;
                    document.getElementById('main-nav').classList.remove('hidden');
                    const userRef = db.collection('artifacts').doc(appId).collection('users').doc(u.uid);
                    
                    userRef.collection('cakes').onSnapshot(snap => {
                        cakes = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        if (activePage === 'home') renderHome();
                        hideLoader();
                    }, err => { hideLoader(); showToast("Check database permissions"); });

                    userRef.collection('orders').onSnapshot(snap => {
                        orders = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => new Date(b.date) - new Date(a.date));
                        if (activePage === 'history') renderHistory();
                    });

                    showPage('home');
                } else {
                    user = null;
                    document.getElementById('main-nav').classList.add('hidden');
                    hideLoader();
                    showPage('login');
                }
            });
        }

        // --- 4. Logic & Utilities ---
        async function compressImage(base64Str) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 480; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.65)); 
                };
            });
        }

        function previewFromUrl() {
            const urlInput = document.getElementById('modal-img-url');
            const preview = document.getElementById('file-preview');
            const label = document.getElementById('file-name-label');
            
            if (urlInput.value.trim() !== "") {
                preview.src = urlInput.value.trim();
                preview.classList.remove('hidden');
                label.classList.add('hidden');
            } else if (!document.getElementById('product-img-file').files.length) {
                preview.classList.add('hidden');
                label.classList.remove('hidden');
            }
        }

        async function handleProductSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('save-product-btn');
            btn.disabled = true; btn.innerHTML = `<div class="loader mx-auto"></div>`;
            const id = document.getElementById('modal-product-id').value;
            const urlValue = document.getElementById('modal-img-url').value.trim();
            let imgData = document.getElementById('file-preview').src;

            // Prioritize URL if provided to save space
            if (urlValue !== "") {
                imgData = urlValue;
            } else if (imgData.startsWith('data:image')) {
                imgData = await compressImage(imgData);
            }

            const data = {
                name: document.getElementById('modal-name').value,
                price: parseInt(document.getElementById('modal-price').value),
                category: document.getElementById('modal-category').value,
                desc: document.getElementById('modal-desc').value,
                img: imgData 
            };

            const ref = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('cakes');
            try {
                if (id) await ref.doc(id).update(data);
                else await ref.add(data);
                closeProductModal();
                showToast(id ? "Changes Saved" : "Added to Inventory");
            } catch(e) { showToast("Sync Error"); }
            finally { btn.disabled = false; btn.innerText = "Save Changes"; }
        }

        async function handleDeleteProduct() {
            const id = document.getElementById('modal-product-id').value;
            if (!id) return;
            
            if (!confirm("Are you sure you want to remove this cake from inventory?")) return;

            const btn = document.getElementById('delete-cake-btn');
            btn.disabled = true; btn.innerHTML = `<div class="loader w-4 h-4"></div>`;
            
            try {
                await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('cakes').doc(id).delete();
                closeProductModal();
                showToast("Cake Deleted");
            } catch(e) { showToast("Delete Failed"); }
            finally { btn.disabled = false; btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>`; }
        }

        async function finalizeOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const loc = document.getElementById('cust-location').value;
            const pkg = document.getElementById('cust-package').value;
            const pay = document.getElementById('cust-payment').value;
            const disc = parseInt(document.getElementById('cust-discount').value) || 0;
            const ads = document.getElementById('cust-addons').value;

            if (!name || !phone || !loc) return showToast("Enter Name, Phone and Location");

            const sub = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const total = Math.max(0, sub - disc);
            const orderId = "1001-" + (orders.length + 1);

            const order = {
                date: new Date().toISOString(), 
                customer: name, 
                phone: phone, 
                location: loc,
                packageType: pkg, 
                paymentType: pay, 
                discount: disc, 
                subtotal: sub, 
                total: total,
                items: cart, 
                addons: ads,
                tempId: orderId,
                status: 'PAID'
            };

            try {
                const ref = await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('orders').add(order);
                
                // --- Premium WhatsApp Receipt Format ---
                const waMsg = `*MAKARIOS CAKES* 🍰\n` +
                              `_Taste the Delicious cakes now_\n` +
                              `------------------------------\n` +
                              `*Order id:* ${orderId}\n` +
                              `*Cake name:* ${cart.map(i => i.name).join(', ')}\n` +
                              `*Quantity:* ${cart.reduce((s,i) => s+i.qty, 0)}\n` +
                              `*Add ons:* ${ads || 'None'}\n` +
                              `*Cost:* ₹${sub.toLocaleString()}.00\n` +
                              `*Discount:* -₹${disc.toLocaleString()}.00\n` +
                              `------------------------------\n` +
                              `*Total cost: ₹${total.toLocaleString()}.00*\n` +
                              `------------------------------\n` +
                              `*Customer name:* ${name}\n` +
                              `*Phone number:* ${phone}\n` +
                              `*Address:* ${loc}\n` +
                              `*Payment type:* ${pay}\n` +
                              `*Payment status:* PAID\n` +
                              `------------------------------\n` +
                              `Thank you for your order! Enjoy your cake! Visit again soon.`;

                const waUrl = `https://wa.me/91${phone}?text=${encodeURIComponent(waMsg)}`;
                cart = []; updateCartUI();
                showPage('success', { order: { id: ref.id, ...order }, waUrl });
            } catch(e) { showToast("Sync Error"); }
        }

        // --- 5. UI Control ---
        function showPage(page, data = null) {
            activePage = page;
            const container = document.getElementById('main-content');
            if (!user && page !== 'login' && page !== 'signup') return renderAuth('login');
            if (page === 'login' || page === 'signup') return renderAuth(page);
            
            container.innerHTML = `<div class="flex justify-center py-20"><div class="loader"></div></div>`;
            setTimeout(() => {
                switch(page) {
                    case 'home': renderHome(); break;
                    case 'checkout': renderCheckout(); break;
                    case 'history': renderHistory(); break;
                    case 'admin': renderAdmin(); break;
                    case 'success': renderSuccess(data); break;
                    case 'order-details': renderOrderDetails(data); break;
                }
            }, 50);
        }

        function renderHome() {
            document.getElementById('main-content').innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6 animate-in slide-in-from-top duration-500">
                    <div><h2 class="text-3xl md:text-5xl font-brand font-bold mb-2 text-brand-purple">Inventory</h2><p class="text-gray-400 uppercase tracking-widest text-[10px] font-bold">Menu Management</p></div>
                    <button onclick="openProductModal()" class="w-full md:w-auto bg-brand-gold text-white px-8 py-4 rounded-2xl font-bold uppercase text-[11px] tracking-widest shadow-xl hover:scale-105 active:scale-95 transition-all">Add New Cake</button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                    ${cakes.map(p => `
                        <div class="cake-card p-4 flex flex-col group relative animate-in fade-in slide-in-from-bottom duration-500">
                            <button onclick="openProductModal('${p.id}')" class="absolute top-6 right-6 z-10 p-3 bg-white/90 backdrop-blur shadow-lg rounded-full text-brand-purple hover:bg-brand-purple hover:text-white transition-all">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-width="2.5"/></svg>
                            </button>
                            <div class="relative h-56 overflow-hidden rounded-[2rem] bg-gray-100"><img src="${p.img}" class="w-full h-full object-cover">
                                <div class="absolute bottom-3 left-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[8px] font-bold uppercase tracking-widest">${p.category}</div>
                            </div>
                            <div class="p-3 mt-4 flex flex-col flex-1">
                                <h3 class="text-lg font-bold mb-1 font-brand">${p.name}</h3>
                                <p class="text-gray-400 text-[10px] leading-relaxed mb-6 line-clamp-2">${p.desc}</p>
                                <div class="mt-auto flex items-center justify-between"><span class="text-xl font-bold text-brand-purple">₹${p.price.toLocaleString()}</span>
                                    <button onclick="addToCart('${p.id}')" class="bg-brand-purple text-white px-6 py-2.5 rounded-xl font-bold text-[9px] uppercase tracking-widest active:scale-95 transition-all">Add</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
        }

        function renderCheckout() {
            const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('main-content').innerHTML = `
                <div class="max-w-6xl mx-auto animate-in slide-in-from-bottom duration-500">
                    <h2 class="text-3xl font-brand font-bold mb-10 text-brand-purple text-center underline decoration-brand-gold underline-offset-8">New Order Entry</h2>
                    <form id="order-form" class="grid lg:grid-cols-2 gap-12">
                        <div class="space-y-6">
                            <input type="text" id="cust-name" placeholder="Customer Full Name" required class="w-full p-5 bg-white rounded-3xl shadow-sm outline-none focus:ring-2 focus:ring-brand-gold">
                            <input type="tel" id="cust-phone" placeholder="WhatsApp Number" required class="w-full p-5 bg-white rounded-3xl shadow-sm outline-none focus:ring-2 focus:ring-brand-gold">
                            <textarea id="cust-location" rows="3" placeholder="Full Delivery Address" required class="w-full p-5 bg-white rounded-3xl shadow-sm outline-none focus:ring-2 focus:ring-brand-gold"></textarea>
                            <div class="grid grid-cols-2 gap-4">
                                <select id="cust-package" class="p-5 bg-white rounded-3xl shadow-sm outline-none"><option value="Standard">Standard Pack</option><option value="Celebration">Celebration Pack</option></select>
                                <select id="cust-payment" class="p-5 bg-white rounded-3xl shadow-sm outline-none"><option value="Cash">Cash</option><option value="Online">Online</option></select>
                            </div>
                            <input type="text" id="cust-addons" placeholder="Add ons (e.g. Candles, Sparkle)" class="w-full p-5 bg-white rounded-3xl shadow-sm outline-none focus:ring-2 focus:ring-brand-gold">
                            <div class="relative"><span class="absolute left-5 top-5 text-brand-gold font-bold text-sm">Discount ₹</span>
                                <input type="number" id="cust-discount" value="0" oninput="calculateTotal()" class="w-full p-5 pl-28 bg-white rounded-3xl shadow-sm border-2 border-brand-gold/10 outline-none focus:border-brand-gold">
                            </div>
                            <button type="button" onclick="finalizeOrder()" class="w-full bg-brand-purple text-white py-6 rounded-3xl font-bold uppercase tracking-[0.2em] shadow-2xl active:scale-95 transition-all">Confirm Booking</button>
                        </div>
                        <div class="bg-white p-10 rounded-[3.5rem] shadow-xl h-fit border border-gray-50 sticky top-32">
                            <h3 class="text-xl font-brand font-bold mb-8">Booking Summary</h3>
                            <div class="space-y-5 mb-8 max-h-60 overflow-y-auto no-scrollbar">${cart.map(i => `<div class="flex justify-between text-sm"><span>${i.name} (x${i.qty})</span><span class="font-bold">₹${(i.price*i.qty).toLocaleString()}</span></div>`).join('')}</div>
                            <div class="pt-8 border-t border-dashed space-y-4">
                                <div class="flex justify-between text-xs text-gray-400 uppercase tracking-widest"><span>Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
                                <div class="flex justify-between text-xs text-red-500 font-bold uppercase tracking-widest"><span>Discount</span><span id="bill-discount">-₹0</span></div>
                                <div class="flex justify-between text-3xl font-brand font-bold pt-6 text-brand-purple border-t"><span>Final Total</span><span id="bill-total">₹${subtotal.toLocaleString()}</span></div>
                            </div>
                        </div>
                    </form>
                </div>`;
        }

        // --- 6. Helper Functions ---
        function showToast(m) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = m;
            t.classList.add('toast-visible'); t.classList.remove('toast-hidden');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { t.classList.remove('toast-visible'); t.classList.add('toast-hidden'); }, 3000);
        }

        function calculateTotal() {
            const s = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const d = parseInt(document.getElementById('cust-discount').value) || 0;
            const bd = document.getElementById('bill-discount');
            const bt = document.getElementById('bill-total');
            if (bd) bd.innerText = `-₹${d.toLocaleString()}`;
            if (bt) bt.innerText = `₹${Math.max(0, s - d).toLocaleString()}`;
        }

        function hideLoader() { document.getElementById('app-loader').classList.add('hidden'); }
        function handleLogout() { auth.signOut(); showPage('login'); }
        function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); document.getElementById('mobile-menu').classList.toggle('flex'); }
        
        function toggleCart() { 
            const sb = document.getElementById('cart-sidebar'); 
            const ov = document.getElementById('cart-overlay'); 
            if(sb.classList.contains('translate-x-0')){
                sb.classList.add('translate-x-full'); 
                sb.classList.remove('translate-x-0'); 
                ov.classList.add('hidden');
            } else {
                sb.classList.remove('translate-x-full'); 
                sb.classList.add('translate-x-0'); 
                ov.classList.remove('hidden'); 
                updateCartUI();
            } 
        }

        function goToCheckout() { 
            if(cart.length > 0) {
                const sb = document.getElementById('cart-sidebar');
                const ov = document.getElementById('cart-overlay');
                sb.classList.add('translate-x-full'); 
                sb.classList.remove('translate-x-0'); 
                ov.classList.add('hidden');
                showPage('checkout');
            } 
        }

        function addToCart(id) { 
            const c = cakes.find(x => x.id === id); 
            const ex = cart.find(x => x.id === id); 
            if(ex) ex.qty++; else cart.push({...c, qty: 1}); 
            updateCartUI(); 
            showToast(`${c.name} added to bin`); 
        }

        function updateCartUI() {
            const countEl = document.getElementById('cart-count');
            if (countEl) countEl.innerText = cart.reduce((s, i) => s + i.qty, 0);
            const list = document.getElementById('cart-items'); if (!list) return;
            if (cart.length === 0) { list.innerHTML = `<div class="py-20 opacity-20 italic text-center">Empty</div>`; document.getElementById('cart-total').innerText = "₹0"; return; }
            list.innerHTML = cart.map(i => `<div class="flex gap-4"><img src="${i.img}" class="w-16 h-16 rounded-2xl object-cover"><div class="flex-1"><h4 class="font-bold text-xs">${i.name}</h4><div class="flex items-center justify-between mt-1"><div class="flex items-center gap-3 bg-gray-50 rounded-lg p-1 px-3"><button onclick="changeQty('${i.id}',-1)">-</button><span>${i.qty}</span><button onclick="changeQty('${i.id}',1)">+</button></div><span class="font-bold text-xs">₹${(i.price*i.qty).toLocaleString()}</span></div></div></div>`).join('');
            document.getElementById('cart-total').innerText = `₹${cart.reduce((s,i)=>s+(i.price*i.qty),0).toLocaleString()}`;
        }

        function changeQty(id, d) { const i = cart.find(x => x.id === id); i.qty += d; if(i.qty <= 0) cart = cart.filter(x => x.id !== id); updateCartUI(); }
        
        function previewFile() { 
            const file = document.getElementById('product-img-file').files[0]; 
            const r = new FileReader(); 
            r.onload = e => { 
                document.getElementById('file-preview').src = e.target.result; 
                document.getElementById('file-preview').classList.remove('hidden'); 
                document.getElementById('file-name-label').classList.add('hidden'); 
                document.getElementById('modal-img-url').value = ""; // Clear URL if file uploaded
            }; 
            r.readAsDataURL(file); 
        }
        
        function closeProductModal() { document.getElementById('product-modal').classList.add('hidden'); }
        
        function openProductModal(id = null) {
            document.getElementById('product-modal').classList.remove('hidden');
            const delBtn = document.getElementById('delete-cake-btn');
            
            if (id) {
                const p = cakes.find(x => x.id === id);
                document.getElementById('modal-title').innerText = "Edit Cake Details";
                document.getElementById('modal-product-id').value = p.id;
                document.getElementById('modal-name').value = p.name;
                document.getElementById('modal-price').value = p.price;
                document.getElementById('modal-category').value = p.category;
                document.getElementById('modal-desc').value = p.desc;
                
                // Set Image Logic
                if (p.img.startsWith('http')) {
                    document.getElementById('modal-img-url').value = p.img;
                } else {
                    document.getElementById('modal-img-url').value = "";
                }
                
                document.getElementById('file-preview').src = p.img;
                document.getElementById('file-preview').classList.remove('hidden');
                document.getElementById('file-name-label').classList.add('hidden');
                delBtn.classList.remove('hidden');
            } else {
                document.getElementById('modal-title').innerText = "Register New Cake";
                document.getElementById('product-form').reset();
                document.getElementById('modal-product-id').value = "";
                document.getElementById('modal-img-url').value = "";
                document.getElementById('file-preview').classList.add('hidden');
                document.getElementById('file-name-label').classList.remove('hidden');
                delBtn.classList.add('hidden');
            }
        }

        // --- 7. Authentication Renderers ---
        function renderAuth(mode = 'login', error = null) {
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div class="max-w-md mx-auto py-12 animate-in fade-in zoom-in duration-500">
                    <div class="text-center mb-10"><img src="1000398562.jpg" class="w-24 h-24 mx-auto mb-6 object-contain">
                        <h2 class="text-4xl font-brand font-bold text-brand-purple text-center">Owner Portal</h2>
                        <p class="text-gray-400 text-[10px] uppercase tracking-[0.3em] mt-1 text-center">Makarios Cloud Access</p>
                    </div>
                    <form onsubmit="handleAuth(event, '${mode}')" class="bg-white p-10 rounded-[3rem] shadow-2xl space-y-6">
                        ${error ? `<div class="bg-red-50 text-red-500 p-4 rounded-2xl text-[10px] font-bold uppercase text-center">Access Denied</div>` : ''}
                        <input type="text" id="auth-user" required value="Makarios.in" placeholder="Username" class="w-full p-5 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-brand-gold">
                        <input type="password" id="auth-pass" required value="Makarios2025" placeholder="Password" class="w-full p-5 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-brand-gold">
                        ${mode === 'signup' ? `<input type="password" id="auth-confirm" required placeholder="Confirm Password" class="w-full p-5 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-brand-gold">` : ''}
                        <button type="submit" id="auth-btn" class="w-full bg-brand-purple text-white py-5 rounded-2xl font-bold uppercase text-[11px] tracking-widest shadow-xl">Secure Login</button>
                    </form>
                    <p class="text-center mt-8 text-[11px] font-medium text-gray-400 uppercase tracking-widest">
                        <button onclick="showPage('${mode === 'login' ? 'signup' : 'login'}')" class="text-brand-gold font-bold underline">${mode === 'login' ? 'Register Account' : 'Back to Login'}</button>
                    </p>
                </div>`;
        }

        async function handleAuth(e, mode) {
            e.preventDefault();
            const u = document.getElementById('auth-user').value;
            const p = document.getElementById('auth-pass').value;
            const email = u.includes('@') ? u : `${u.toLowerCase()}@makarios-2025.in`;
            try {
                if (mode === 'signup') await auth.createUserWithEmailAndPassword(email, p);
                else await auth.signInWithEmailAndPassword(email, p);
            } catch(err) { renderAuth(mode, true); }
        }

        function renderHistory() {
            document.getElementById('main-content').innerHTML = `
                <h2 class="text-4xl font-brand font-bold mb-10 text-brand-purple">Order Archive</h2>
                <div class="grid gap-4">${orders.map(o => `
                    <div class="bg-white p-6 rounded-[2rem] border border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4 hover:shadow-md cursor-pointer group" onclick="showPage('order-details', '${o.id}')">
                        <div class="text-left w-full md:w-auto"><span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">#${o.tempId || o.id.slice(-6).toUpperCase()}</span><h3 class="font-bold text-base group-hover:text-brand-gold transition-colors">${o.customer}</h3><p class="text-[10px] text-gray-400">${new Date(o.date).toLocaleDateString()}</p></div>
                        <div class="flex items-center gap-6"><span class="text-2xl font-brand font-bold">₹${o.total.toLocaleString()}</span><button onclick="event.stopPropagation(); downloadPDF('${o.id}')" class="p-3 bg-gray-50 rounded-xl hover:bg-brand-purple hover:text-white transition-all"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke-width="2"/></svg></button></div>
                    </div>`).join('')}</div>`;
        }

        function renderAdmin() {
            const total = orders.reduce((s,o) => s + o.total, 0);
            document.getElementById('main-content').innerHTML = `
                <div class="grid md:grid-cols-2 gap-8 mb-12">
                    <div class="bg-brand-purple p-10 rounded-[3rem] text-white shadow-2xl transition-all hover:scale-[1.02]"><span class="text-[10px] uppercase font-bold opacity-50 tracking-widest">Gross Revenue</span><p class="text-5xl font-brand font-bold mt-2">₹${total.toLocaleString()}</p></div>
                    <div class="bg-white p-10 rounded-[3rem] border border-gray-100 shadow-sm"><span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Total Bookings</span><p class="text-5xl font-brand font-bold mt-2">${orders.length}</p></div>
                </div>
                <div class="bg-white p-10 rounded-[3rem] border border-gray-100 shadow-xl h-[450px] animate-in fade-in duration-1000"><h3 class="text-2xl font-brand font-bold mb-10 text-brand-purple">Sales Analytics</h3><canvas id="perfChart"></canvas></div>`;
            const canvas = document.getElementById('perfChart');
            if (canvas) new Chart(canvas.getContext('2d'), { type: 'line', data: { labels: orders.slice(0, 10).reverse().map(o => o.tempId || o.id.slice(-4)), datasets: [{ label: 'Sale Value', data: orders.slice(0, 10).reverse().map(o => o.total), borderColor: '#B88E2F', backgroundColor: 'rgba(184, 142, 47, 0.1)', fill: true, tension: 0.4 }] }, options: { maintainAspectRatio: false } });
        }

        function renderSuccess(d) {
            document.getElementById('main-content').innerHTML = `
                <div class="max-w-md mx-auto py-20 text-center animate-in zoom-in duration-500">
                    <div class="w-20 h-20 bg-green-50 text-green-600 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl"><svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="4"/></svg></div>
                    <h2 class="text-4xl font-brand font-bold mb-4">Confirmed!</h2>
                    <p class="text-gray-400 mb-10 font-medium">Order: #${d.order.tempId || d.order.id.slice(-6).toUpperCase()}</p>
                    <div class="space-y-4">
                        <a href="${d.waUrl}" target="_blank" class="block w-full bg-[#25D366] text-white py-5 rounded-3xl font-bold uppercase text-[11px] tracking-widest shadow-lg text-center transition-transform hover:scale-105">WhatsApp Receipt</a>
                        <button onclick="downloadPDF('${d.order.id}')" class="block w-full bg-brand-purple text-white py-5 rounded-3xl font-bold uppercase text-[11px] tracking-widest shadow-lg transition-transform hover:scale-105">Save PDF Bill</button>
                        <button onclick="showPage('home')" class="block w-full text-brand-gold font-bold uppercase text-[10px] underline pt-4">Return to Inventory</button>
                    </div>
                </div>`;
        }

        // --- 9. Premium Vertical PDF Receipt ---
        function downloadPDF(id) {
            const o = orders.find(x => x.id === id);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: [82, 240] }); // Standard thermal width
            const logo = document.getElementById('brand-logo-img');

            // Header Background & Branding
            doc.setFillColor(61, 28, 42); 
            doc.rect(0, 0, 82, 45, 'F');
            
            try { doc.addImage(logo, 'JPEG', 6, 4, 70, 30); } catch(e) {}

            doc.setTextColor(255);
            doc.setFont('Playfair+Display', 'bold');
            doc.setFontSize(14);
            doc.text('MAKARIOS CAKES', 40, 34, { align: 'center' });
            doc.setFont('Courier', 'italic');
            doc.setFontSize(8);
            doc.text('Taste the Delicious cakes now', 40, 40, { align: 'center' });

            // Content Body
            doc.setTextColor(40);
            doc.setFont('Courier', 'normal');
            doc.setFontSize(9);
            
            let y = 55;
            doc.text('--------------------------------', 40, y, { align: 'center' }); y += 6;
            
            doc.setFont('Courier', 'bold');
            doc.text(`Order id: ${o.tempId || o.id.slice(-6).toUpperCase()}`, 7, y); y += 6;
            doc.setFont('Courier', 'normal');
            doc.text(`Date: ${new Date(o.date).toLocaleDateString()}`, 7, y);
            doc.text(`Time: ${new Date(o.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`, 45, y); y += 8;

            doc.text('--------------------------------', 40, y, { align: 'center' }); y += 6;

            // Cake Info
            doc.setFont('Courier', 'bold');
            doc.text('Items:', 7, y); y += 6;
            doc.setFont('Courier', 'normal');
            o.items.forEach(i => {
                doc.text(`• ${i.name}`, 7, y);
                doc.text(`₹${(i.price*i.qty).toLocaleString()}.00`, 65, y, { align: 'right' });
                y += 5;
            });
            y += 2;
            doc.text(`Quantity: ${o.items.reduce((s,i)=>s+i.qty, 0)}`, 7, y); y += 6;
            doc.text(`Add ons: ${o.addons || 'None'}`, 7, y); y += 8;

            doc.text('--------------------------------', 40, y, { align: 'center' }); y += 6;

            // Costs
            doc.text('Subtotal Cost:', 7, y);
            doc.text(`₹${o.subtotal.toLocaleString()}.00`, 65, y, { align: 'right' }); y += 6;
            doc.text('Discount:', 7, y);
            doc.text(`-₹${o.discount.toLocaleString()}.00`, 65, y, { align: 'right' }); y += 6;

            doc.text('--------------------------------', 40, y, { align: 'center' }); y += 8;

            // Grand Total
            doc.setFontSize(11);
            doc.setFont('Courier', 'bold');
            doc.text('Total Cost:', 7, y);
            doc.text(`₹${o.total.toLocaleString()}.00`, 65, y, { align: 'right' }); y += 5;
            
            doc.setFontSize(9);
            doc.setFont('Courier', 'normal');
            doc.text('--------------------------------', 40, y, { align: 'center' }); y += 8;

            // Customer Info
            doc.setFont('Courier', 'bold');
            doc.text('Customer Data:', 7, y); y += 6;
            doc.setFont('Courier', 'normal');
            doc.text(`Name: ${o.customer}`, 7, y); y += 6;
            doc.text(`Phone: ${o.phone}`, 7, y); y += 6;
            doc.text(`Address: ${o.location}`, 7, y, { maxWidth: 68 }); y += 10;
            
            doc.text(`Payment: ${o.paymentType}`, 7, y); y += 6;
            doc.text(`Status: PAID`, 7, y); y += 10;

            doc.text('--------------------------------', 40, y, { align: 'center' }); y += 8;

            // Footer
            doc.setFont('Courier', 'italic');
            doc.text('Thank you for your order! Enjoy', 40, y, { align: 'center' }); y += 5;
            doc.text('your cake! Visit again soon.', 40, y, { align: 'center' });

            doc.save(`Makarios_Bill_${o.tempId || o.id.slice(-4)}.pdf`);
        }

        function renderOrderDetails(id) {
            const o = orders.find(x => x.id === id);
            document.getElementById('main-content').innerHTML = `
                <div class="max-w-3xl mx-auto py-10 animate-in zoom-in duration-500">
                    <div class="bg-white p-10 rounded-[3rem] shadow-2xl">
                        <h2 class="text-3xl font-brand font-bold mb-8 text-brand-purple text-center underline decoration-brand-gold underline-offset-8">Booking Detail</h2>
                        <div class="space-y-4 mb-10 pb-10 border-b border-gray-100">
                            <p class="text-sm">Order ID: <b>#${o.tempId || o.id.slice(-6).toUpperCase()}</b></p>
                            <p class="text-sm">Customer: <b>${o.customer}</b></p>
                            <p class="text-sm">Contact: <b>${o.phone}</b></p>
                            <p class="text-sm">Location: <b>${o.location}</b></p>
                        </div>
                        <div class="space-y-3 mb-10">${o.items.map(i => `<div class="flex justify-between text-sm"><span>${i.name} (x${i.qty})</span><span>₹${(i.price*i.qty).toLocaleString()}</span></div>`).join('')}</div>
                        <div class="pt-8 border-t border-dashed space-y-4">
                             <div class="flex justify-between text-xs text-gray-400 uppercase font-bold tracking-widest"><span>Grand Total Paid</span><span class="text-brand-purple text-xl font-brand font-bold">₹${o.total.toLocaleString()}</span></div>
                        </div>
                        <div class="mt-12 flex gap-4"><button onclick="downloadPDF('${o.id}')" class="flex-1 bg-brand-purple text-white py-5 rounded-2xl font-bold uppercase text-[10px] tracking-widest shadow-lg">Download PDF</button><button onclick="showPage('history')" class="flex-1 bg-gray-50 text-gray-500 py-5 rounded-2xl font-bold uppercase text-[10px] tracking-widest">Go Back</button></div>
                    </div>
                </div>`;
        }

        initApp();
    </script>
