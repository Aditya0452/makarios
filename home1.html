<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makarios Cakes - Sweet Moments, Divine Bites</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-purple: #3D1C2A;
            --brand-gold: #B88E2F;
            --brand-cream: #FDFBF7;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--brand-cream);
            color: var(--brand-purple);
            overflow-x: hidden;
        }
        .font-brand { font-family: 'Playfair+Display', serif; }
        .bg-brand-purple { background-color: var(--brand-purple); }
        .text-brand-purple { color: var(--brand-purple); }
        .border-brand-gold { border-color: var(--brand-gold); }
        .bg-brand-gold { background-color: var(--brand-gold); }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: var(--brand-gold); border-radius: 10px; }

        .cake-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cake-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        
        /* Fix for mobile button layout */
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            flex-wrap: nowrap;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-page { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md shadow-sm px-4 py-3 md:px-8 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer group" onclick="showPage('home')">
            <div class="bg-brand-purple p-1.5 rounded-lg group-hover:bg-brand-gold transition-colors">
                <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L15 8H9L12 2Z" fill="currentColor"/>
                    <path d="M6 8H18V20C18 21.1046 17.1046 22 16 22H8C6.89543 22 6 21.1046 6 20V8Z" stroke="currentColor"/>
                </svg>
            </div>
            <h1 class="text-xl md:text-2xl font-brand font-bold tracking-tight leading-none">
                Makarios 
                <span class="text-brand-gold font-normal text-[10px] block uppercase tracking-[0.2em]">Cakes</span>
            </h1>
        </div>
        
        <div class="hidden lg:flex gap-10 items-center text-xs font-semibold uppercase tracking-widest">
            <button onclick="showPage('home')" class="hover:text-brand-gold transition-colors relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-brand-gold hover:after:w-full after:transition-all">Home</button>
            <button onclick="showPage('history')" class="hover:text-brand-gold transition-colors relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-brand-gold hover:after:w-full after:transition-all">Order History</button>
            <button onclick="showPage('admin')" class="hover:text-brand-gold transition-colors relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-brand-gold hover:after:w-full after:transition-all">Admin Panel</button>
        </div>

        <div class="flex items-center gap-2 md:gap-4">
            <button onclick="toggleCart()" class="relative p-2.5 hover:bg-gray-100 rounded-full transition-all group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span id="cart-count" class="absolute top-1 right-1 bg-brand-gold text-white text-[9px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">0</span>
            </button>
            <button class="lg:hidden p-2 hover:bg-gray-100 rounded-full" onclick="toggleMobileMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden fixed inset-0 z-[100] bg-white pt-24 px-8 flex-col gap-8 text-center text-xl uppercase font-brand font-bold tracking-widest">
        <button onclick="showPage('home'); toggleMobileMenu()">Home</button>
        <button onclick="showPage('history'); toggleMobileMenu()">Order History</button>
        <button onclick="showPage('admin'); toggleMobileMenu()">Admin Panel</button>
        <button onclick="toggleMobileMenu()" class="mt-auto mb-10 text-brand-gold text-sm font-sans tracking-normal font-medium">Close Menu</button>
    </div>

    <!-- Main Content -->
    <main id="main-content" class="p-4 md:p-10 max-w-7xl mx-auto animate-page">
        <!-- Pages injected here -->
    </main>

    <!-- Side Cart -->
    <div id="cart-overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[110]" onclick="toggleCart()"></div>
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full sm:w-[420px] bg-white z-[120] shadow-2xl transform translate-x-full transition-transform duration-500 ease-in-out p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold font-brand">Shopping Bag</h2>
            <button onclick="toggleCart()" class="p-2 hover:rotate-90 transition-transform duration-300">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto space-y-6 pr-2">
            <!-- Cart Items -->
        </div>
        <div class="mt-8 pt-8 border-t border-gray-100">
            <div class="flex justify-between items-end mb-6">
                <span class="text-gray-400 uppercase tracking-widest text-xs font-bold">Estimated Total</span>
                <span id="cart-total" class="text-2xl font-bold text-brand-purple">₹0.00</span>
            </div>
            <button onclick="goToCheckout()" class="w-full bg-brand-purple text-white py-5 rounded-2xl font-bold uppercase tracking-widest hover:bg-brand-gold shadow-xl hover:shadow-brand-gold/20 transition-all flex items-center justify-center gap-3">
                Checkout Now
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-brand-purple text-white px-8 py-4 rounded-2xl shadow-2xl transform translate-y-32 transition-transform duration-500 z-[200] flex items-center gap-3 font-medium">
        <svg class="w-5 h-5 text-brand-gold" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path></svg>
        <span id="toast-msg">Item added to cart!</span>
    </div>

    <script>
        const products = [
            { id: 1, name: 'Belgian Chocolate Truffle', price: 1200, desc: 'Rich, dark chocolate ganache with a silky finish.', category: 'Premium', img: 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=800&auto=format&fit=crop&q=60' },
            { id: 2, name: 'Fresh Fruit Medley', price: 950, desc: 'Seasonal exotic fruits with vanilla sponge.', category: 'Fresh', img: 'https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?w=800&auto=format&fit=crop&q=60' },
            { id: 3, name: 'Classic Red Velvet', price: 1100, desc: 'Beetroot-tinted sponge with cream cheese frosting.', category: 'Classic', img: 'https://images.unsplash.com/photo-1586788680434-30d324b2d46f?w=800&auto=format&fit=crop&q=60' },
            { id: 4, name: 'Lotus Biscoff Dream', price: 1400, desc: 'Caramelized cookie butter spread and crunch.', category: 'Premium', img: 'https://images.unsplash.com/photo-1535141192574-5d4897c12636?w=800&auto=format&fit=crop&q=60' },
            { id: 5, name: 'Mango Sunshine', price: 850, desc: 'Real Alphonso mango pulp and cream layers.', category: 'Seasonal', img: 'https://images.unsplash.com/photo-1550617931-e17a7b70dce2?w=800&auto=format&fit=crop&q=60' },
            { id: 6, name: 'Ferrero Rocher Delight', price: 1550, desc: 'Hazelnut chocolate goodness with whole nuts.', category: 'Premium', img: 'https://images.unsplash.com/photo-1606312619070-d48b4c652a52?w=800&auto=format&fit=crop&q=60' },
            { id: 7, name: 'Vanilla Bean Berry', price: 900, desc: 'Madagascar vanilla and wild raspberry compote.', category: 'Fresh', img: 'https://images.unsplash.com/photo-1571115177098-24ec42ed2bb4?w=800&auto=format&fit=crop&q=60' },
            { id: 8, name: 'Tiramisu Infusion', price: 1300, desc: 'Espresso soaked sponge with mascarpone cream.', category: 'Classic', img: 'https://images.unsplash.com/photo-1571115177098-24ec42ed2bb4?w=800&auto=format&fit=crop&q=60' },
        ];

        let cart = [];
        let orders = JSON.parse(localStorage.getItem('makarios_orders')) || [];

        function showPage(pageName, data = null) {
            const container = document.getElementById('main-content');
            container.classList.remove('animate-page');
            void container.offsetWidth; // Trigger reflow
            container.classList.add('animate-page');
            window.scrollTo(0, 0);

            switch(pageName) {
                case 'home': renderHome(container); break;
                case 'checkout': renderCheckout(container); break;
                case 'history': renderHistory(container); break;
                case 'admin': renderAdmin(container); break;
                case 'success': renderSuccess(container, data); break;
            }
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
            menu.classList.toggle('flex');
        }

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            const overlay = document.getElementById('cart-overlay');
            const isOpen = sidebar.style.transform === 'translateX(0%)';
            sidebar.style.transform = isOpen ? 'translateX(100%)' : 'translateX(0%)';
            overlay.classList.toggle('hidden');
            renderCart();
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            if (existing) existing.qty++;
            else cart.push({ ...product, qty: 1 });
            updateCartUI();
            showToast(`Added ${product.name} to cart!`);
        }

        function updateCartUI() {
            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-count').innerText = count;
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center h-64 text-gray-300"><svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg><p class="uppercase tracking-widest text-xs font-bold">Your bag is empty</p></div>`;
                document.getElementById('cart-total').innerText = `₹0.00`;
                return;
            }
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price * item.qty;
                return `<div class="flex gap-4 p-4 rounded-2xl bg-gray-50 border border-gray-100"><img src="${item.img}" class="w-20 h-20 object-cover rounded-xl shadow-sm"><div class="flex-1 flex flex-col justify-between"><div class="flex justify-between items-start"><h4 class="font-bold text-sm leading-tight line-clamp-2">${item.name}</h4><button onclick="removeItem(${item.id})" class="text-gray-400 hover:text-red-500 transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg></button></div><div class="flex items-center justify-between"><div class="flex items-center gap-3 bg-white border border-gray-200 rounded-lg px-2 py-1"><button onclick="changeQty(${item.id}, -1)" class="text-brand-purple font-bold px-1 text-sm">-</button><span class="text-xs font-bold w-4 text-center">${item.qty}</span><button onclick="changeQty(${item.id}, 1)" class="text-brand-purple font-bold px-1 text-sm">+</button></div><span class="font-bold text-sm">₹${(item.price * item.qty).toLocaleString()}</span></div></div></div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `₹${total.toLocaleString()}`;
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }

        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }

        function goToCheckout() {
            if (cart.length === 0) return;
            toggleCart();
            showPage('checkout');
        }

        function renderHome(container) {
            container.innerHTML = `
                <section class="space-y-12">
                    <div class="relative h-[250px] sm:h-[400px] lg:h-[500px] rounded-[2rem] overflow-hidden shadow-2xl group">
                        <img src="https://images.unsplash.com/photo-1535141192574-5d4897c12636?w=1600" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent flex flex-col justify-end p-8 sm:p-16">
                            <h2 class="text-4xl sm:text-6xl lg:text-7xl font-brand text-white mb-4 max-w-2xl leading-[1.1]">Artisan Cakes for Celebrations</h2>
                            <p class="text-brand-gold text-xs sm:text-sm font-bold tracking-[0.4em] uppercase mb-8">Sweet Moments, Divine Bites</p>
                            <button onclick="document.getElementById('catalog').scrollIntoView({behavior:'smooth'})" class="w-fit bg-brand-gold text-white px-10 py-4 rounded-full hover:bg-white hover:text-brand-purple transition-all font-bold text-sm tracking-widest uppercase">Order Now</button>
                        </div>
                    </div>

                    <div id="catalog" class="pt-8">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 mb-10">
                            <div>
                                <h3 class="text-3xl font-brand font-bold mb-2">The Collection</h3>
                                <p class="text-gray-400 text-sm">Handcrafted with passion and the finest ingredients.</p>
                            </div>
                            <div class="flex gap-2 overflow-x-auto w-full sm:w-auto pb-2 sm:pb-0 scrollbar-hide">
                                <button class="whitespace-nowrap px-6 py-2 rounded-full border border-brand-purple bg-brand-purple text-white text-xs font-bold uppercase tracking-wider">All</button>
                                <button class="whitespace-nowrap px-6 py-2 rounded-full border border-gray-200 hover:border-brand-gold transition-all text-xs font-bold uppercase tracking-wider">Premium</button>
                                <button class="whitespace-nowrap px-6 py-2 rounded-full border border-gray-200 hover:border-brand-gold transition-all text-xs font-bold uppercase tracking-wider text-gray-400">Seasonal</button>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 xs:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-8">
                            ${products.map(p => `
                                <div class="cake-card bg-white rounded-3xl overflow-hidden border border-gray-100 flex flex-col p-4">
                                    <div class="relative aspect-square rounded-2xl overflow-hidden mb-5">
                                        <img src="${p.img}" class="w-full h-full object-cover">
                                        <span class="absolute top-3 left-3 bg-white/90 backdrop-blur-sm text-brand-purple text-[9px] font-black px-3 py-1.5 rounded-full uppercase tracking-widest shadow-sm">${p.category}</span>
                                    </div>
                                    <div class="px-1 flex flex-col flex-1">
                                        <h3 class="text-lg font-bold mb-2 group-hover:text-brand-gold transition-colors">${p.name}</h3>
                                        <p class="text-[11px] leading-relaxed text-gray-400 mb-6 flex-1 line-clamp-2">${p.desc}</p>
                                        
                                        <div class="card-footer pt-4 border-t border-gray-50 mt-auto">
                                            <div class="flex flex-col">
                                                <span class="text-[10px] text-gray-300 uppercase tracking-widest font-bold">Price</span>
                                                <span class="text-xl font-bold text-brand-purple">₹${p.price.toLocaleString()}</span>
                                            </div>
                                            <button onclick="addToCart(${p.id})" class="bg-brand-purple text-white p-3.5 rounded-2xl hover:bg-brand-gold transition-all shadow-lg hover:shadow-brand-gold/30 active:scale-90 shrink-0">
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
                                                </svg>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </section>
            `;
        }

        function renderCheckout(container) {
            const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const delivery = subtotal > 1500 ? 0 : 150;
            const discount = subtotal > 3000 ? subtotal * 0.15 : (subtotal > 2000 ? subtotal * 0.1 : 0);
            const total = subtotal + delivery - discount;

            container.innerHTML = `
                <div class="grid lg:grid-cols-12 gap-12">
                    <div class="lg:col-span-7 space-y-10">
                        <div>
                            <button onclick="showPage('home')" class="text-xs font-bold text-brand-gold uppercase tracking-widest flex items-center gap-2 mb-6 hover:translate-x-[-5px] transition-transform">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                                Back to Shop
                            </button>
                            <h2 class="text-4xl font-brand font-bold">Checkout Information</h2>
                        </div>
                        
                        <form id="order-form" onsubmit="handlePlaceOrder(event)" class="space-y-8">
                            <div class="grid sm:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-[10px] uppercase font-bold tracking-widest text-gray-400">Full Name</label>
                                    <input type="text" name="name" required class="w-full p-4 rounded-2xl bg-white border border-gray-100 focus:border-brand-gold outline-none shadow-sm text-sm">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[10px] uppercase font-bold tracking-widest text-gray-400">Phone Number</label>
                                    <input type="tel" name="phone" required class="w-full p-4 rounded-2xl bg-white border border-gray-100 focus:border-brand-gold outline-none shadow-sm text-sm">
                                </div>
                            </div>
                            
                            <div class="space-y-2">
                                <label class="text-[10px] uppercase font-bold tracking-widest text-gray-400">Delivery Address</label>
                                <textarea name="location" required rows="3" class="w-full p-4 rounded-2xl bg-white border border-gray-100 focus:border-brand-gold outline-none shadow-sm text-sm" placeholder="Complete address including landmarks"></textarea>
                            </div>

                            <div class="grid sm:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-[10px] uppercase font-bold tracking-widest text-gray-400">Celebration Kit</label>
                                    <select name="addons" class="w-full p-4 rounded-2xl bg-white border border-gray-100 focus:border-brand-gold outline-none shadow-sm text-sm appearance-none cursor-pointer">
                                        <option value="none">Standard Packaging (₹0)</option>
                                        <option value="candles">Sparkle Candles (+₹50)</option>
                                        <option value="card">Personalized Gift Card (+₹100)</option>
                                        <option value="balloons">Celebration Balloons (+₹300)</option>
                                    </select>
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[10px] uppercase font-bold tracking-widest text-gray-400">Payment Preference</label>
                                    <div class="flex gap-4">
                                        <label class="flex-1 border border-gray-100 p-4 rounded-2xl flex items-center justify-center gap-3 cursor-pointer hover:bg-white shadow-sm transition-all has-[:checked]:border-brand-gold has-[:checked]:bg-white has-[:checked]:ring-1 has-[:checked]:ring-brand-gold">
                                            <input type="radio" name="payment" value="Online" checked class="accent-brand-gold">
                                            <span class="text-xs font-bold uppercase tracking-widest">Online</span>
                                        </label>
                                        <label class="flex-1 border border-gray-100 p-4 rounded-2xl flex items-center justify-center gap-3 cursor-pointer hover:bg-white shadow-sm transition-all has-[:checked]:border-brand-gold has-[:checked]:bg-white has-[:checked]:ring-1 has-[:checked]:ring-brand-gold">
                                            <input type="radio" name="payment" value="COD" class="accent-brand-gold">
                                            <span class="text-xs font-bold uppercase tracking-widest">COD</span>
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="w-full py-5 bg-brand-purple text-white rounded-2xl font-bold uppercase tracking-widest hover:bg-brand-gold shadow-2xl hover:shadow-brand-gold/30 transform active:scale-[0.98] transition-all">
                                Place My Order
                            </button>
                        </form>
                    </div>

                    <div class="lg:col-span-5">
                        <div class="bg-white p-8 rounded-[2rem] shadow-2xl border border-gray-50 h-fit sticky top-32">
                            <h3 class="text-xl font-bold mb-8 font-brand">Review Summary</h3>
                            <div class="space-y-6 mb-8 max-h-60 overflow-y-auto pr-2">
                                ${cart.map(i => `
                                    <div class="flex justify-between items-center text-sm">
                                        <div class="flex items-center gap-3">
                                            <img src="${i.img}" class="w-10 h-10 object-cover rounded-lg">
                                            <div>
                                                <p class="font-bold leading-none mb-1">${i.name}</p>
                                                <p class="text-xs text-gray-400">Quantity: ${i.qty}</p>
                                            </div>
                                        </div>
                                        <span class="font-bold">₹${(i.price * i.qty).toLocaleString()}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="space-y-4 pt-8 border-t border-dashed border-gray-200">
                                <div class="flex justify-between text-sm">
                                    <span class="text-gray-400 font-medium">Subtotal</span>
                                    <span class="font-bold">₹${subtotal.toLocaleString()}</span>
                                </div>
                                <div class="flex justify-between text-sm">
                                    <span class="text-gray-400 font-medium">Shipping</span>
                                    <span class="${delivery === 0 ? 'text-green-600' : 'text-brand-purple'} font-bold">${delivery === 0 ? 'FREE' : '₹' + delivery.toLocaleString()}</span>
                                </div>
                                ${discount > 0 ? `
                                <div class="flex justify-between text-sm text-green-600">
                                    <span class="font-medium">Reward Discount</span>
                                    <span class="font-bold">-₹${discount.toLocaleString()}</span>
                                </div>
                                ` : ''}
                                <div class="flex justify-between text-2xl font-bold pt-4 text-brand-purple">
                                    <span>Total</span>
                                    <span>₹${total.toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function handlePlaceOrder(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const delivery = subtotal > 1500 ? 0 : 150;
            const discount = subtotal > 3000 ? subtotal * 0.15 : (subtotal > 2000 ? subtotal * 0.1 : 0);
            const addonsMap = { 'none': 0, 'candles': 50, 'card': 100, 'balloons': 300 };
            const addonCost = addonsMap[formData.get('addons')] || 0;
            const total = subtotal + delivery - discount + addonCost;

            const order = {
                id: 'MK-' + Math.random().toString(36).substr(2, 6).toUpperCase(),
                date: new Date().toISOString(),
                customer: formData.get('name'),
                phone: formData.get('phone'),
                location: formData.get('location'),
                payment: formData.get('payment'),
                addon: formData.get('addons'),
                addonCost: addonCost,
                items: [...cart],
                subtotal: subtotal,
                delivery: delivery,
                discount: discount,
                total: total
            };

            orders.unshift(order);
            localStorage.setItem('makarios_orders', JSON.stringify(orders));
            
            const msg = `🍰 *Order Confirmed!* 🍰\n\n*ID:* ${order.id}\n*Customer:* ${order.customer}\n*Items:* ${order.items.map(i => `${i.name} (x${i.qty})`).join(', ')}\n*Total:* ₹${order.total.toLocaleString()}\n*Payment:* ${order.payment}\n*Address:* ${order.location}`;
            const waUrl = `https://wa.me/911234567890?text=${encodeURIComponent(msg)}`;
            
            cart = [];
            updateCartUI();
            showPage('success', { order, waUrl });
        }

        function renderSuccess(container, { order, waUrl }) {
            container.innerHTML = `
                <div class="max-w-2xl mx-auto text-center py-16 px-4">

                        <div class="relative bg-brand-gold text-white w-full h-full rounded-full flex items-center justify-center shadow-2xl">
                            <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                    </div>
                    <h2 class="text-5xl font-brand font-bold mb-6">Sweet Success!</h2>

                    <div class="grid sm:grid-cols-2 gap-4">
                        <button onclick="downloadPDF('${order.id}')" class="flex items-center justify-center gap-3 bg-white border-2 border-brand-purple text-brand-purple py-5 rounded-2xl font-bold uppercase tracking-widest hover:bg-brand-purple hover:text-white transition-all shadow-xl">

                        <a href="${waUrl}" target="_blank" class="flex items-center justify-center gap-3 bg-green-500 text-white py-5 rounded-2xl font-bold uppercase tracking-widest hover:bg-green-600 transition-all shadow-xl">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.438 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981z"></path></svg>
                            WhatsApp Status
                        </a>
                    </div>
                    <button onclick="showPage('home')" class="mt-12 text-gray-400 font-bold hover:text-brand-purple transition-colors uppercase tracking-[0.3em] text-[10px]">Continue Shopping</button>
                </div>
            `;
        }

        function renderHistory(container) {
            container.innerHTML = `
                <div class="space-y-12">

                                    </div>

        function renderAdmin(container) {
            const currentMonth = new Date().getMonth();
            const monthlyOrders = orders.filter(o => new Date(o.date).getMonth() === currentMonth);
            const totalEarnings = monthlyOrders.reduce((sum, o) => sum + o.total, 0);

            container.innerHTML = `
                <div class="space-y-12">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                        <div>
                            <h2 class="text-4xl font-brand font-bold mb-2 text-brand-purple">Business Analytics</h2>
                            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Makarios Cakes Dashboard</p>
                        </div>
                        <div class="flex gap-4">
                            <div class="bg-white p-2 rounded-xl border border-gray-100 shadow-sm flex items-center gap-3 pr-6">
                                <div class="bg-green-100 text-green-600 p-2.5 rounded-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg></div>
                                <div><p class="text-[9px] text-gray-400 uppercase font-black tracking-widest leading-none">Status</p><p class="text-sm font-bold text-green-600">LIVE</p></div>
                            </div>
                        </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                        <div class="bg-brand-purple text-white p-10 rounded-[2.5rem] shadow-2xl relative overflow-hidden group">
                            <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/5 rounded-full group-hover:scale-150 transition-transform duration-700"></div>
                            <h3 class="text-xs uppercase tracking-[0.3em] opacity-50 font-bold mb-4">Monthly Revenue</h3>
                            <p class="text-5xl font-brand font-bold mb-6">₹${totalEarnings.toLocaleString()}</p>
                            <div class="flex items-center gap-2 text-xs font-bold"><span class="bg-white/20 px-2 py-1 rounded">CURR_MONTH</span><span class="text-brand-gold">+12.5% vs Last</span></div>
                        </div>
                        <div class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-gray-50 flex flex-col justify-between">
                            <h3 class="text-xs uppercase tracking-[0.3em] text-gray-300 font-bold mb-4">Total Deliveries</h3>
                            <p class="text-5xl font-brand font-bold text-brand-purple">${monthlyOrders.length}</p>
                            <div class="mt-8 h-1 bg-gray-100 rounded-full overflow-hidden"><div class="h-full bg-brand-gold w-[70%]"></div></div>
                        </div>
                        <div class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-gray-50 flex flex-col justify-between">
                            <h3 class="text-xs uppercase tracking-[0.3em] text-gray-300 font-bold mb-4">Unique Patrons</h3>
                            <p class="text-5xl font-brand font-bold text-brand-purple">${[...new Set(monthlyOrders.map(o => o.phone))].length}</p>

                        </div>
                    </div>

                    <div class="bg-white rounded-[2.5rem] shadow-xl border border-gray-50 overflow-hidden">
                        <div class="p-8 border-b border-gray-50 flex justify-between items-center">
                            <h3 class="font-brand font-bold text-xl">Recent Sales Log</h3>
                            <button class="text-[10px] font-black uppercase tracking-widest text-brand-gold hover:text-brand-purple transition-colors">Export CSV</button>

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.remove('translate-y-32');
            t.classList.add('-translate-y-4');
            setTimeout(() => {
                t.classList.add('translate-y-32');
                t.classList.remove('-translate-y-4');
            }, 3000);
        }

        function downloadPDF(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(61, 28, 42); 
            doc.rect(0, 0, 210, 50, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(26);
            doc.text('MAKARIOS CAKES', 20, 30);
            doc.setFontSize(10);
            doc.text('SWEET MOMENTS, DIVINE BITES | OFFICIAL INVOICE', 20, 38);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(14);
            doc.text(`REFERENCE NO: ${order.id}`, 20, 70);
            doc.setFontSize(10);
            doc.text(`ISSUED ON: ${new Date(order.date).toLocaleDateString()}`, 20, 78);
            doc.setFontSize(12);
            doc.text('CLIENT DETAILS:', 20, 95);
            doc.setFontSize(10);
            doc.text(order.customer, 20, 103);
            doc.text(order.phone, 20, 108);
            doc.text(order.location, 20, 113, { maxWidth: 80 });
            doc.setFillColor(250, 250, 250);
            doc.rect(20, 130, 170, 10, 'F');
            doc.setFontSize(9);
            doc.text('DESCRIPTION', 25, 136);
            doc.text('QTY', 120, 136);
            doc.text('UNIT PRICE', 145, 136);
            doc.text('LINE TOTAL', 175, 136);
            let y = 150;
            order.items.forEach(i => {
                doc.text(i.name, 25, y);
                doc.text(i.qty.toString(), 122, y);
                doc.text(i.price.toLocaleString(), 145, y);
                doc.text((i.price * i.qty).toLocaleString(), 175, y);
                y += 10;
            });
            y += 10;
            doc.setDrawColor(230, 230, 230);
            doc.line(120, y, 190, y);
            y += 10;
            doc.text('NET SUB-TOTAL:', 120, y);
            doc.text(order.subtotal.toLocaleString(), 175, y);
            y += 8;
            doc.text('DELIVERY FEE:', 120, y);
            doc.text(order.delivery.toLocaleString(), 175, y);
            if (order.addonCost > 0) {
                y += 8;
                doc.text(`BUNDLE (${order.addon}):`, 120, y);
                doc.text(order.addonCost.toLocaleString(), 175, y);
            }
            if (order.discount > 0) {
                y += 8;
                doc.setTextColor(200, 0, 0);
                doc.text('SPECIAL DISCOUNT:', 120, y);
                doc.text(`-INR ${order.discount.toLocaleString()}`, 175, y);
                doc.setTextColor(0,0,0);
            }
            y += 15;
            doc.setFontSize(16);
            doc.setFont(undefined, 'bold');
            doc.text('GRAND TOTAL:', 120, y);
            doc.text(`INR ${order.total.toLocaleString()}`, 170, y);
            doc.setFont(undefined, 'normal');
            doc.setFontSize(8);
            doc.setTextColor(180, 180, 180);
            doc.text('This is a computer generated invoice for Makarios Cakes. Sweetness delivered.', 105, 280, { align: 'center' });
            doc.save(`Makarios_Invoice_${order.id}.pdf`);
        }

        window.onload = () => {
            showPage('home');
            updateCartUI();
        }
    </script>
</body>
